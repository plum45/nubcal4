            const [isSDKReady, setIsSDKReady] = useState(false);
            const [user, setUser] = useState(null);

            const [step, setStep] = useState('loading');
            const [view, setView] = useState('home'); 
            
            const [formData, setFormData] = useState({ gender: 'male', age: '', weight: '', height: '', activity: '1.2', goal: 'maintain' });
            
            const [foodInput, setFoodInput] = useState("");
            const [loading, setLoading] = useState(false);
            const [loadingText, setLoadingText] = useState(""); // ระบุสถานะว่าค้นหาจากไหน
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);
            const [mealType, setMealType] = useState('Lunch');
            const [dailyLog, setDailyLog] = useState([]);
            const [waterIntake, setWaterIntake] = useState(0);
            
            // โหมดกรอกแคลอรีเอง (กรณีค้นหาไม่เจอทั้ง Local และ Web)
            const [manualEntryMode, setManualEntryMode] = useState(false);
            const [manualData, setManualData] = useState({ calories: '', protein: '', carbs: '', fat: '' });

            const getGreeting = () => {
                const hour = new Date().getHours();
                if (hour < 12) return 'อรุณสวัสดิ์ ☀️';
                if (hour < 18) return 'สวัสดีตอนบ่าย ☕';
                return 'สวัสดีตอนเย็น 🌙';
            };

            useEffect(() => {
                const timer = setTimeout(() => setSplashStep('finished'), 2000);
                const checkSDK = setInterval(() => { if (window.FirebaseSDK) { setIsSDKReady(true); clearInterval(checkSDK); } }, 100);
                return () => { clearTimeout(timer); clearInterval(checkSDK); };
            }, []);

            useEffect(() => {
                if (!isSDKReady) return;
                const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged } = window.FirebaseSDK;
                const appInstance = initializeApp(firebaseConfig);
                const authInstance = getAuth(appInstance);
                signInAnonymously(authInstance).catch((err) => setError(`Auth Error: ${err.message}`));
                const unsubscribe = onAuthStateChanged(authInstance, setUser);
                return () => unsubscribe();
            }, [isSDKReady]);

            useEffect(() => {
                if (!user || !isSDKReady) return;
                const { getFirestore, doc, getDoc, collection, onSnapshot } = window.FirebaseSDK;
                const db = getFirestore();
                const appIdStr = "calorie-ai-pro-glass";

                getDoc(doc(db, 'artifacts', appIdStr, 'users', user.uid, 'settings', 'profile')).then(snap => {
                    if (snap.exists()) {
                        setProfile(snap.data());
                        setFormData({ 
                            gender: snap.data().gender || 'male', age: snap.data().age || '', weight: snap.data().weight || '', 
                            height: snap.data().height || '', activity: snap.data().activity || '1.2', goal: snap.data().goal || 'maintain'
                        });
                        setStep('dashboard');
                    } else setStep('onboarding');
                });

                const unsubscribeMeals = onSnapshot(collection(db, 'artifacts', appIdStr, 'users', user.uid, 'meals'), (snapshot) => {
                    const todayStr = new Date().toDateString();
                    const filtered = snapshot.docs.map(d => ({ id: d.id, ...d.data() })).filter(m => m.timestamp && m.timestamp.toDate().toDateString() === todayStr);
                    setDailyLog(filtered.sort((a,b) => b.timestamp - a.timestamp));
                });

                const unsubscribeWater = onSnapshot(doc(db, 'artifacts', appIdStr, 'users', user.uid, 'water', new Date().toLocaleDateString('en-CA')), (docSnap) => {
                    setWaterIntake(docSnap.exists() ? docSnap.data().amount : 0);
                });

                return () => { unsubscribeMeals(); unsubscribeWater(); };
            }, [user, isSDKReady]);

            const calculateStats = (data) => {
                const { gender, age, weight, height, activity, goal } = data;
                const w = parseFloat(weight); const h = parseFloat(height); const a = parseInt(age); const act = parseFloat(activity);
                if (isNaN(w) || isNaN(h) || isNaN(a)) return { bmr: 0, tdee: 0, bmi: 0 };
                
                let bmr = gender === 'male' ? (10 * w) + (6.25 * h) - (5 * a) + 5 : (10 * w) + (6.25 * h) - (5 * a) - 161;
                const baseTdee = Math.round(bmr * act);
                const bmi = (w / ((h / 100) ** 2)).toFixed(1);

                let targetCalories = baseTdee;
                if (goal === 'lose') targetCalories -= 400; 
                else if (goal === 'gain') targetCalories += 300; 

                let proPct = 0.3, carbPct = 0.4, fatPct = 0.3;
                if (goal === 'lose') { proPct = 0.4; carbPct = 0.3; fatPct = 0.3; } 
                else if (goal === 'gain') { proPct = 0.35; carbPct = 0.45; fatPct = 0.2; } 

                return { 
                    bmr: Math.round(bmr), tdee: baseTdee, targetCalories, 
                    targetPro: Math.round((targetCalories * proPct) / 4), 
                    targetCarb: Math.round((targetCalories * carbPct) / 4), 
                    targetFat: Math.round((targetCalories * fatPct) / 9), 
                    bmi, goal 
                };
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                if (!user || !isSDKReady) return;
                const { getFirestore, doc, setDoc } = window.FirebaseSDK;
                const stats = calculateStats(formData);
                const newProfile = { ...formData, ...stats };
                await setDoc(doc(getFirestore(), 'artifacts', 'calorie-ai-pro-glass', 'users', user.uid, 'settings', 'profile'), newProfile);
                setProfile(newProfile); setStep('dashboard');
            };

            const handleUpdateProfile = async (e) => {
                e.preventDefault();
                if (!user || !isSDKReady) return;
                const { getFirestore, doc, setDoc } = window.FirebaseSDK;
                const stats = calculateStats(formData);
                const newProfile = { ...formData, ...stats };
                await setDoc(doc(getFirestore(), 'artifacts', 'calorie-ai-pro-glass', 'users', user.uid, 'settings', 'profile'), newProfile);
                setProfile(newProfile); setView('home');
            };

            // 💡 ค้นหาข้อมูลแบบ Hybrid (Local -> Web API -> Manual)
            const handleSearchFood = async (foodName) => {
                const targetText = (foodName || foodInput).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, '').trim().toLowerCase(); // ลบ Emoji
                if (!targetText) return;
                
                setLoading(true); setError(null); setManualEntryMode(false);
                
                // ขั้นที่ 1: ค้นหาในฐานข้อมูลส่วนตัวก่อน (Local DB)
                setLoadingText("กำลังค้นหาในฐานข้อมูล...");
                const foundLocal = LOCAL_FOOD_DB.find(f => targetText.includes(f.name.toLowerCase()) || f.name.toLowerCase().includes(targetText));
                
                if (foundLocal) {
                    setTimeout(() => {
                        setResult({ ...foundLocal });
                        setView('result');
                        setFoodInput("");
                        setLoading(false);
                    }, 400); // ดีเลย์นิดหน่อยให้ดูสมูท
                    return;
                }

                // ขั้นที่ 2: ถ้าไม่เจอ ให้ดึงจากเว็บ API (Open Food Facts - ฟรี ไม่ต้องใช้ Key)
                setLoadingText("กำลังค้นหาจากเครือข่ายเว็บทั่วโลก...");
                try {
                    const res = await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(targetText)}&search_simple=1&action=process&json=1&page_size=1`);
                    const data = await res.json();

                    if (data.products && data.products.length > 0) {
                        const product = data.products[0];
                        // หาค่าแคลอรีต่อ 100g หรือต่อหน่วยบริโภค
                        const cal = product.nutriments['energy-kcal_100g'] || product.nutriments['energy-kcal_serving'] || product.nutriments['energy-kcal'] || 0;

                        if (cal > 0) {
                            setResult({
                                food_name: product.product_name_th || product.product_name_en || product.product_name || targetText,
                                calories: Math.round(cal),
                                protein: Math.round(product.nutriments['proteins_100g'] || product.nutriments['proteins_serving'] || 0),
                                carbs: Math.round(product.nutriments['carbohydrates_100g'] || product.nutriments['carbohydrates_serving'] || 0),
                                fat: Math.round(product.nutriments['fat_100g'] || product.nutriments['fat_serving'] || 0),
                                summary: "ข้อมูลอ้างอิงจากฐานข้อมูลสากล (Open Food Facts)"
                            });
                            setView('result');
                            setFoodInput("");
                            setLoading(false);
                            return;
                        }
                    }
                } catch (err) {
                    console.error("Web fetch failed", err);
                }

                // ขั้นที่ 3: ไม่พบในเว็บอีก ให้เปิดหน้ากรอกข้อมูลเอง
                setLoading(false);
                setManualEntryMode(true);
                setManualData({ calories: '', protein: '', carbs: '', fat: '' });
            };

            const handleSaveManualEntry = (e) => {
                e.preventDefault();
                const cal = parseInt(manualData.calories) || 0;
                if(cal <= 0) {
                    setError("กรุณาระบุจำนวนแคลอรีที่มากกว่า 0"); return;
                }
                setResult({
                    food_name: foodInput,
                    calories: cal,
                    protein: parseInt(manualData.protein) || 0,
                    carbs: parseInt(manualData.carbs) || 0,
                    fat: parseInt(manualData.fat) || 0,
                    summary: "เพิ่มข้อมูลโดยผู้ใช้งาน"
                });
                setView('result');
                setFoodInput("");
                setManualEntryMode(false);
            };

            const saveMeal = async () => {
                try {
                    const { getFirestore, collection, addDoc, serverTimestamp } = window.FirebaseSDK;
                    await addDoc(collection(getFirestore(), 'artifacts', 'calorie-ai-pro-glass', 'users', user.uid, 'meals'), { ...result, mealType, timestamp: serverTimestamp() });
                    setView('home'); setResult(null);
                } catch (err) { setError(`Save Error: ${err.message}`); }
            };

            const handleAddWater = async (amount) => {
                try {
                    const { getFirestore, doc, setDoc } = window.FirebaseSDK;
                    const newAmount = Math.max(0, waterIntake + amount);
                    await setDoc(doc(getFirestore(), 'artifacts', 'calorie-ai-pro-glass', 'users', user.uid, 'water', new Date().toLocaleDateString('en-CA')), { amount: newAmount }, { merge: true });
                } catch (err) { setError(`Water Error`); }
            };

            // ประมวลผลสารอาหาร & โค้ชอัจฉริยะ (Rule-based)
            const consumedCal = dailyLog.reduce((s, m) => s + (m.calories || 0), 0);
            const consumedPro = dailyLog.reduce((s, m) => s + (m.protein || 0), 0);
            const consumedCarb = dailyLog.reduce((s, m) => s + (m.carbs || 0), 0);
            const consumedFat = dailyLog.reduce((s, m) => s + (m.fat || 0), 0);
            
            const targetCal = profile?.targetCalories || 2000;
            const targetPro = profile?.targetPro || 150;
            const targetCarb = profile?.targetCarb || 200;
            const targetFat = profile?.targetFat || 65;
            
            const progressCal = Math.min((consumedCal / targetCal) * 100, 100);

            const getTrainerTip = () => {
                if (!profile) return "ระบุเป้าหมายในโปรไฟล์ เพื่อให้โค้ชแนะนำได้ตรงจุดครับ";
                if (consumedCal === 0) return "เริ่มต้นวันใหม่! อย่าลืมทานมื้อเช้าเพื่อเติมพลังงานนะครับ 🍳";
                
                const remCal = targetCal - consumedCal;
                const remPro = targetPro - consumedPro;

                if (remCal < 0) return "🔥 แคลอรีเกินเป้าหมายแล้ว! ไม่เป็นไรครับ พรุ่งนี้ค่อยลุยกันใหม่ ควบคุมสติให้ดี!";
                if (remCal < 300) return `⚠️ แคลอรีใกล้เต็มแล้ว (เหลือ ${remCal} kcal) มื้อต่อไปเน้นโปรตีนล้วน ผัก และน้ำเปล่านะครับ`;
                if (remPro > (targetPro * 0.5)) return `💪 โปรตีนยังขาดอีกเยอะเลย (${remPro}g) มื้อหน้าจัดเนื้อสัตว์ อกไก่ หรือไข่เพิ่มหน่อยครับ!`;
                if (consumedCarb > targetCarb) return `🍚 กินคาร์บเยอะไปนิดนึงแล้ว มื้อต่อไปพยายามลดแป้งและน้ำตาลลงนะครับ`;
                
                return "🎯 ยอดเยี่ยม! รักษาสัดส่วนการกินแบบนี้ไว้ กำลังไปได้สวยเลยครับ ลุยต่อ!";
            };

            // --- UI Rendering ---
            if (splashStep !== 'finished') return (
                <div className="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-[#fafaf9]">
                    <dotlottie-wc src="https://lottie.host/78ddc33b-4844-4fc1-873e-7b41c27384ff/iKB3yDnm5e.lottie" style={{ width: '250px', height: '250px' }} autoplay loop />
                    <p className="text-stone-500 font-medium text-sm tracking-widest uppercase mt-4 animate-pulse">Loading System...</p>
                </div>
            );

            if (step === 'loading') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center bg-[#fafaf9]">
                    <div className="minimal-card p-10 max-w-sm w-full animate-in">
                        <div className="w-16 h-16 bg-stone-100 rounded-full flex items-center justify-center text-stone-800 mx-auto mb-6"><Icon name="Activity" size={28} /></div>
                        <h1 className="text-2xl font-bold text-stone-900 mb-3">จดแคล & โค้ชส่วนตัว</h1>
                        <p className="text-stone-500 text-sm mb-10 leading-relaxed">พิมพ์ค้นหาเมนู ดึงข้อมูลอัตโนมัติ พร้อมรับคำแนะนำโภชนาการแบบทันที</p>
                        <button onClick={() => setStep('checking')} className="w-full btn-primary py-4 font-semibold text-[15px] flex items-center justify-center space-x-2">
                            <span>เริ่มต้นใช้งาน</span><Icon name="ArrowRight" size={18} />
                        </button>
                    </div>
                </div>
            );

            if (step === 'onboarding') return (
                <div className="min-h-screen p-6 flex flex-col justify-center max-w-md mx-auto text-left bg-[#fafaf9]">
                    <div className="minimal-card p-8 animate-in">
                        <h1 className="text-2xl font-bold mb-1 text-stone-900">สร้างโปรไฟล์</h1>
                        <p className="text-stone-500 text-sm mb-6">เพื่อให้โค้ชคำนวณเป้าหมายที่เหมาะสม</p>
                        <form onSubmit={handleRegister} className="space-y-4">
                            <div className="space-y-1">
                                <label className="text-[11px] font-semibold text-stone-400 uppercase tracking-wider ml-1">เป้าหมายหลัก</label>
                                <div className="grid grid-cols-3 gap-2">
                                    <button type="button" onClick={() => setFormData({...formData, goal: 'lose'})} className={`py-3 rounded-2xl text-xs font-semibold border ${formData.goal === 'lose' ? 'bg-teal-50 border-teal-200 text-teal-700' : 'bg-white border-stone-200 text-stone-500'}`}>ลดน้ำหนัก</button>
                                    <button type="button" onClick={() => setFormData({...formData, goal: 'maintain'})} className={`py-3 rounded-2xl text-xs font-semibold border ${formData.goal === 'maintain' ? 'bg-blue-50 border-blue-200 text-blue-700' : 'bg-white border-stone-200 text-stone-500'}`}>รักษารูปร่าง</button>
                                    <button type="button" onClick={() => setFormData({...formData, goal: 'gain'})} className={`py-3 rounded-2xl text-xs font-semibold border ${formData.goal === 'gain' ? 'bg-rose-50 border-rose-200 text-rose-700' : 'bg-white border-stone-200 text-stone-500'}`}>เพิ่มกล้าม</button>
                                </div>
                            </div>
                            <div className="flex bg-stone-100 p-1 rounded-2xl">
                                {['male', 'female'].map(g => (<button key={g} type="button" onClick={() => setFormData({...formData, gender: g})} className={`flex-1 py-2.5 rounded-xl font-medium text-sm transition-all ${formData.gender === g ? 'bg-white shadow-sm text-stone-900' : 'text-stone-500'}`}>{g === 'male' ? 'ผู้ชาย' : 'ผู้หญิง'}</button>))}
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <Input label="น้ำหนัก (kg)" value={formData.weight} onChange={v => setFormData({...formData, weight: v})} />
                                <Input label="ส่วนสูง (cm)" value={formData.height} onChange={v => setFormData({...formData, height: v})} />
                            </div>
                            <Input label="อายุ (ปี)" value={formData.age} onChange={v => setFormData({...formData, age: v})} />
                            <div className="space-y-1">
                                <label className="text-[11px] font-semibold text-stone-400 uppercase tracking-wider ml-1">กิจกรรมประจำวัน</label>
                                <select value={formData.activity} onChange={e => setFormData({...formData, activity: e.target.value})} className="w-full bg-stone-50 border border-stone-200 p-4 rounded-2xl text-sm outline-none focus:border-stone-400 focus:bg-white transition-all text-stone-800">
                                    <option value="1.2">นั่งทำงานเป็นหลัก</option><option value="1.375">ออกกำลังเบา (1-3 วัน)</option><option value="1.55">ออกกำลังปานกลาง (3-5 วัน)</option><option value="1.725">ออกกำลังหนัก (6-7 วัน)</option>
                                </select>
                            </div>
                            <button type="submit" className="w-full btn-primary py-4 font-semibold text-[15px] mt-2">คำนวณแผนของฉัน</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-32 max-w-md mx-auto bg-[#fafaf9]">
                    <header className="px-6 pt-10 pb-4">
                        <div className="flex justify-between items-center mb-6">
                            <div>
                                <p className="text-xs text-stone-500 font-medium mb-1">{getGreeting()}</p>
                                <h2 className="text-xl font-bold text-stone-800 flex items-center gap-2">
                                    <span>สมุดบันทึกสุขภาพ</span>
                                </h2>
                            </div>
                        </div>

                        {/* Smart Trainer Alert */}
                        <div className="bg-stone-900 text-white rounded-2xl p-4 mb-6 shadow-lg flex gap-3 items-start animate-in">
                            <div className="bg-stone-800 p-2 rounded-full shrink-0"><Icon name="Target" size={20} className="text-teal-400"/></div>
                            <div>
                                <h4 className="text-sm font-bold mb-1">โค้ชแนะนำ</h4>
                                <p className="text-xs text-stone-300 leading-relaxed">{getTrainerTip()}</p>
                            </div>
                        </div>

                        {/* Detailed Macro Ring & Bars */}
                        <div className="minimal-card p-6 flex items-center justify-between shadow-sm">
                            <div className="relative w-28 h-28 flex items-center justify-center shrink-0">
                                <svg className="w-full h-full -rotate-90">
                                    <circle cx="56" cy="56" r="48" fill="transparent" stroke="#f5f5f4" strokeWidth="10" />
                                    <circle cx="56" cy="56" r="48" fill="transparent" stroke={progressCal > 100 ? "#ef4444" : "#14b8a6"} strokeWidth="10" strokeDasharray={301.5} strokeDashoffset={301.5 - (301.5 * Math.min(progressCal, 100)) / 100} strokeLinecap="round" className="transition-all duration-1000 ease-out" />
                                </svg>
                                <div className="absolute text-center flex flex-col items-center justify-center mt-1">
                                    <p className="text-2xl font-bold text-stone-800 leading-none">{consumedCal}</p>
                                    <p className="text-[9px] font-semibold text-stone-400 uppercase tracking-widest mt-1">/ {targetCal}</p>
                                </div>
                            </div>
                            
                            <div className="flex-1 ml-5 space-y-3.5 w-full">
                                <MacroProgress label="โปรตีน" current={consumedPro} target={targetPro} color="bg-rose-400" bg="bg-rose-50" />
                                <MacroProgress label="คาร์บ" current={consumedCarb} target={targetCarb} color="bg-amber-400" bg="bg-amber-50" />
                                <MacroProgress label="ไขมัน" current={consumedFat} target={targetFat} color="bg-stone-400" bg="bg-stone-100" />
                            </div>
                        </div>
                    </header>

                    <main className="px-6 space-y-6">
                        {error && (<div className="p-4 bg-red-50 text-red-600 rounded-2xl text-xs flex items-start gap-2 animate-in"><Icon name="AlertCircle" size={16} className="mt-0.5 flex-shrink-0" /><span>{error}</span><button onClick={() => setError(null)} className="ml-auto"><Icon name="X" size={14}/></button></div>)}
                        
                        {view === 'home' && (
                            <>
                                {/* Search Input */}
                                <div className="minimal-card p-2 flex items-center shadow-sm border border-stone-100 relative">
                                    <div className="pl-4 pr-2 text-stone-400"><Icon name={loading ? "RefreshCw" : "Search"} size={20} className={loading ? "animate-spin" : ""} /></div>
                                    <input type="text" value={foodInput} onChange={e => setFoodInput(e.target.value)} placeholder="ค้นหาเมนูอาหาร หรือสแกนชื่อสินค้า..." className="flex-1 bg-transparent py-3 text-sm outline-none text-stone-800 font-medium" onKeyDown={e => e.key === 'Enter' && handleSearchFood()} disabled={loading} />
                                    <button onClick={() => handleSearchFood()} disabled={loading || !foodInput.trim()} className="bg-stone-900 text-white p-3 rounded-xl disabled:opacity-50 transition-all shadow-sm">
                                        ค้นหา
                                    </button>
                                    {/* Loading Tooltip */}
                                    {loading && <div className="absolute -top-10 right-0 bg-stone-800 text-white text-[10px] px-3 py-1.5 rounded-lg animate-pulse">{loadingText}</div>}
                                </div>

                                {/* Quick Emoji Tags */}
                                <div>
                                    <h3 className="text-xs font-semibold text-stone-400 mb-3 px-1 uppercase tracking-wide">เมนูยอดฮิต</h3>
                                    <div className="flex overflow-x-auto chip-scroll gap-2 pb-2">
                                        {QUICK_TAGS.map((tag) => (
                                            <button key={tag} onClick={() => { setFoodInput(tag); handleSearchFood(tag); }} disabled={loading} className="whitespace-nowrap bg-white border border-stone-200 px-4 py-2 rounded-full text-sm font-medium text-stone-600 shadow-sm active:scale-95 transition-all hover:border-stone-300 disabled:opacity-50">
                                                {tag}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Manual Entry Overlay */}
                                {manualEntryMode && (
                                    <div className="minimal-card p-6 border-2 border-teal-100 bg-teal-50/30 animate-in">
                                        <div className="flex justify-between items-start mb-4">
                                            <div>
                                                <h3 className="font-bold text-stone-800 text-base">ไม่พบ "{foodInput}" ในระบบ</h3>
                                                <p className="text-xs text-stone-500 mt-1">กรุณาระบุข้อมูลโภชนาการด้วยตนเอง</p>
                                            </div>
                                            <button onClick={() => setManualEntryMode(false)} className="text-stone-400 hover:text-stone-600"><Icon name="X" size={20}/></button>
                                        </div>
                                        <form onSubmit={handleSaveManualEntry} className="space-y-4">
                                            <Input label="แคลอรี (kcal) *" value={manualData.calories} onChange={v => setManualData({...manualData, calories: v})} />
                                            <div className="grid grid-cols-3 gap-3">
                                                <Input label="โปรตีน (g)" value={manualData.protein} onChange={v => setManualData({...manualData, protein: v})} />
                                                <Input label="คาร์บ (g)" value={manualData.carbs} onChange={v => setManualData({...manualData, carbs: v})} />
                                                <Input label="ไขมัน (g)" value={manualData.fat} onChange={v => setManualData({...manualData, fat: v})} />
                                            </div>
                                            <button type="submit" disabled={!manualData.calories} className="w-full btn-primary py-3 font-semibold text-sm">เพิ่มข้อมูลนี้</button>
                                        </form>
                                    </div>
                                )}
                                
                                {/* Timeline History */}
                                <div>
                                    <h3 className="text-xs font-semibold text-stone-400 mb-4 px-1 uppercase tracking-wide">ประวัติการกินวันนี้</h3>
                                    <div className="minimal-card p-5 space-y-4">
                                        {dailyLog.length === 0 ? <p className="text-center text-stone-400 py-6 text-sm">ยังไม่ได้ทานอะไรเลย 🍽️</p> : 
                                            dailyLog.map((m, i) => (
                                                <div key={m.id} className={`flex items-center justify-between ${i !== dailyLog.length - 1 ? 'border-b border-stone-100 pb-4' : ''}`}>
                                                    <div className="flex items-center gap-3">
                                                        <div className="w-10 h-10 rounded-full bg-stone-50 flex items-center justify-center text-stone-600 font-bold text-xs border border-stone-100">{m.mealType === 'Breakfast' ? 'เช้า' : m.mealType === 'Lunch' ? 'เที่ยง' : m.mealType === 'Dinner' ? 'เย็น' : 'ว่าง'}</div>
                                                        <div>
                                                            <p className="font-semibold text-stone-800 text-sm max-w-[150px] truncate">{m.food_name}</p>
                                                            <p className="text-[11px] text-stone-400 mt-0.5">{m.protein}p • {m.carbs}c • {m.fat}f</p>
                                                        </div>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className="font-bold text-stone-800">{m.calories}</p>
                                                        <p className="text-[9px] text-stone-400 uppercase font-semibold">kcal</p>
                                                    </div>
                                                </div>
                                            ))
                                        }
                                    </div>
                                </div>
                            </>
                        )}

                        {view === 'result' && result && (
                            <div className="minimal-card p-8 text-center animate-in">
                                <div className="flex justify-start mb-4"><button onClick={() => setView('home')} className="text-stone-400 p-2"><Icon name="ChevronLeft"/></button></div>
                                
                                {/* ไอคอนบอกแหล่งที่มา (ถ้ามีคำว่าเว็บ ให้โชว์รูปลูกโลก) */}
                                <div className="w-16 h-16 bg-teal-50 rounded-full flex items-center justify-center text-teal-600 mx-auto mb-4">
                                    {result.summary.includes("เว็บ") || result.summary.includes("Open Food") ? <Icon name="Globe" size={24}/> : <Icon name="Activity" size={24}/>}
                                </div>

                                <h2 className="text-xl font-bold text-stone-900 mb-1">{result.food_name}</h2>
                                <p className="text-stone-500 text-xs mb-8">"{result.summary}"</p>
                                
                                <div className="bg-stone-900 text-white rounded-3xl py-6 mb-8 shadow-lg">
                                    <span className="text-5xl font-bold tracking-tight">{result.calories}</span>
                                    <span className="text-xs text-stone-300 ml-1 font-semibold">kcal</span>
                                </div>
                                
                                <div className="grid grid-cols-3 gap-3 mb-8">
                                    <MacroBlock label="โปรตีน" value={result.protein} color="text-rose-500" />
                                    <MacroBlock label="คาร์บ" value={result.carbs} color="text-amber-500" />
                                    <MacroBlock label="ไขมัน" value={result.fat} color="text-stone-500" />
                                </div>
                                
                                <div className="text-left mb-8">
                                    <label className="text-xs font-semibold text-stone-500 mb-3 block text-center">มื้ออาหาร</label>
                                    <div className="flex bg-stone-100 p-1 rounded-2xl">
                                        {['Breakfast', 'Lunch', 'Dinner', 'Snack'].map(type => (<button key={type} onClick={() => setMealType(type)} className={`flex-1 py-3 rounded-xl font-medium text-xs transition-all ${mealType === type ? 'bg-white shadow-sm text-stone-900' : 'text-stone-500'}`}>{type === 'Breakfast' ? 'เช้า' : type === 'Lunch' ? 'เที่ยง' : type === 'Dinner' ? 'เย็น' : 'ว่าง'}</button>))}
                                    </div>
                                </div>
                                
                                <button onClick={saveMeal} className="w-full btn-primary py-4 font-semibold text-[15px] flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-all"><Icon name="CheckCircle2" size={18}/><span>ยืนยันการบันทึกมื้อนี้</span></button>
                            </div>
                        )}

                        {view === 'profile' && (
                            <div className="minimal-card p-8 text-left animate-in">
                                <h3 className="font-bold text-stone-800 flex items-center gap-2 mb-6"><Icon name="User" size={20}/><span>โปรไฟล์ & เป้าหมาย</span></h3>
                                <form onSubmit={handleUpdateProfile} className="space-y-5">
                                    <div className="space-y-1">
                                        <label className="text-[11px] font-semibold text-stone-400 uppercase tracking-wider ml-1">เป้าหมายของคุณ</label>
                                        <div className="grid grid-cols-3 gap-2">
                                            <button type="button" onClick={() => setFormData({...formData, goal: 'lose'})} className={`py-3 rounded-xl text-xs font-semibold border ${formData.goal === 'lose' ? 'bg-teal-50 border-teal-200 text-teal-700' : 'bg-white border-stone-200 text-stone-500'}`}>ลดน้ำหนัก</button>
                                            <button type="button" onClick={() => setFormData({...formData, goal: 'maintain'})} className={`py-3 rounded-xl text-xs font-semibold border ${formData.goal === 'maintain' ? 'bg-blue-50 border-blue-200 text-blue-700' : 'bg-white border-stone-200 text-stone-500'}`}>รักษารูปร่าง</button>
                                            <button type="button" onClick={() => setFormData({...formData, goal: 'gain'})} className={`py-3 rounded-xl text-xs font-semibold border ${formData.goal === 'gain' ? 'bg-rose-50 border-rose-200 text-rose-700' : 'bg-white border-stone-200 text-stone-500'}`}>เพิ่มกล้าม</button>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <Input label="น้ำหนัก (กก.)" value={formData.weight} onChange={v => setFormData({...formData, weight: v})} />
                                        <Input label="ส่วนสูง (ซม.)" value={formData.height} onChange={v => setFormData({...formData, height: v})} />
                                    </div>
                                    <Input label="อายุ (ปี)" value={formData.age} onChange={v => setFormData({...formData, age: v})} />
                                    <div className="space-y-1">
                                        <label className="text-[11px] font-semibold text-stone-400 uppercase tracking-wider ml-1">กิจกรรมประจำวัน</label>
                                        <select value={formData.activity} onChange={e => setFormData({...formData, activity: e.target.value})} className="w-full bg-stone-50 border border-stone-200 p-4 rounded-2xl text-sm outline-none focus:border-stone-400 focus:bg-white transition-all text-stone-800"><option value="1.2">นั่งทำงานเป็นหลัก</option><option value="1.375">ออกกำลังเบา (1-3 วัน)</option><option value="1.55">ออกกำลังปานกลาง (3-5 วัน)</option><option value="1.725">ออกกำลังหนัก (6-7 วัน)</option></select>
                                    </div>
                                    <button type="submit" className="w-full btn-primary py-4 font-semibold text-[15px] mt-4">อัปเดตข้อมูล</button>
                                </form>
                            </div>
                        )}
                    </main>
                    
                    {/* Bottom Navigation */}
                    <nav className="fixed bottom-6 left-6 right-6 minimal-nav h-16 rounded-full flex items-center justify-around px-2 z-50 shadow-sm border border-white">
                        <button onClick={() => setView('home')} className={`p-3 rounded-full transition-all ${view === 'home' ? 'text-stone-900 bg-stone-100' : 'text-stone-400 hover:text-stone-600'}`}><Icon name="Home" size={22}/></button>
                        <button onClick={() => setView('profile')} className={`p-3 rounded-full transition-all ${view === 'profile' ? 'text-stone-900 bg-stone-100' : 'text-stone-400 hover:text-stone-600'}`}><Icon name="User" size={22}/></button>
                    </nav>
                </div>
            );
        }

        // Sub-components
        function Input({ label, value, onChange }) { return (<div className="space-y-1 text-left"><label className="text-[11px] font-semibold text-stone-400 uppercase tracking-widest ml-1">{label}</label><input required type="number" value={value} onChange={e => onChange(e.target.value)} className="w-full bg-stone-50 border border-stone-200 p-4 rounded-2xl text-sm outline-none focus:border-stone-400 focus:bg-white transition-all text-stone-800" /></div>); }
        
        function MacroBlock({ label, value, color }) { return (<div className="bg-stone-50 p-4 rounded-2xl border border-stone-100 flex flex-col items-center"><p className={`text-[10px] font-bold uppercase tracking-wider mb-1 text-stone-400`}>{label}</p><p className={`text-lg font-bold ${color}`}>{value}<span className="text-[10px] ml-0.5 opacity-60">g</span></p></div>); }

        function MacroProgress({ label, current, target, color, bg }) { 
            const percent = Math.min((current / target) * 100, 100) || 0;
            return (
                <div className="space-y-1.5 w-full">
                    <div className="flex justify-between text-[10px] font-bold text-stone-500 uppercase tracking-wide">
                        <span>{label}</span>
                        <span>{current} / {target}g</span>
                    </div>
                    <div className={`h-2 w-full rounded-full ${bg} overflow-hidden`}>
                        <div className={`h-full rounded-full ${color} transition-all duration-500`} style={{ width: `${percent}%` }}></div>
                    </div>
                </div>
            ); 
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
