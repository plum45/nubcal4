<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NubCal AI - วิเคราะห์แคลอรีอัจฉริยะ</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.3/dist/dotlottie-wc.js" type="module"></script>
    
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; margin: 0; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(255, 255, 255, 0.6); }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.8); }
        .glass-nav { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(20px); border-top: 1px solid rgba(255, 255, 255, 0.5); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        .fade-out { opacity: 0; transition: opacity 0.8s ease-in-out; pointer-events: none; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        window.FirebaseSDK = { initializeApp, getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, serverTimestamp, getAuth, signInAnonymously, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                Camera: <><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>,
                RefreshCw: <><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></>,
                Activity: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>,
                AlertCircle: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>,
                Flame: <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>,
                Utensils: <><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></>,
                User: <><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
                Plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
                History: <><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><polyline points="12 7 12 12 15 15"/></>,
                PieChart: <><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></>,
                ChevronLeft: <polyline points="15 18 9 12 15 6"/>,
                Droplets: <><path d="M7 16.3c2.2 0 4-1.8 4-4 0-3.3-4-6.3-4-6.3s-4 3-4 6.3c0 2.2 1.8 4 4 4Z"/><path d="M17 18.5c1.1 0 2-1.1 2-2.5 0-2.4-2-4-2-4s-2 1.6-2 4c0 1.4.9 2.5 2 2.5Z"/></>,
                MessageCircle: <path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/>,
                Send: <><line x1="22" y1="2" x2="11" y2="13"/><polyline points="22 2 15 22 11 13 2 9 22 2"/></>,
                ScanText: <><path d="M4 7V4h3"/><path d="M17 4h3v3"/><path d="M20 17v3h-3"/><path d="M7 20H4v-3"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="7" y1="8" x2="10" y2="8"/><line x1="7" y1="16" x2="14" y2="16"/></>,
                Sparkles: <><path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"/></>,
                X: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
                Edit3: <><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></>,
                CheckCircle2: <><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></>,
                Info: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></>,
                ArrowRight: <><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>,
                Settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const firebaseConfig = {
            apiKey: "AIzaSyCKSPlMznK713bLuSyR3b7Kj1BJcCuQeJI",
            authDomain: "nubcal-cbd69.firebaseapp.com",
            projectId: "nubcal-cbd69",
            storageBucket: "nubcal-cbd69.firebasestorage.app",
            messagingSenderId: "44640039163",
            appId: "1:44640039163:web:6ae6d2573f26e08ee4805e",
            measurementId: "G-4EHW3MLZ4G"
        };

        function App() {
            const [splashStep, setSplashStep] = useState('animating');
            const [isSDKReady, setIsSDKReady] = useState(false);
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [step, setStep] = useState('loading');
            const [view, setView] = useState('home');
            
            const [formData, setFormData] = useState({ gender: 'male', age: '', weight: '', height: '', activity: '1.2' });
            const [image, setImage] = useState(null);
            const [imagePreview, setImagePreview] = useState(null);
            const [userHint, setUserHint] = useState("");
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);
            const [mealType, setMealType] = useState('Breakfast');
            const [dailyLog, setDailyLog] = useState([]);
            const [waterIntake, setWaterIntake] = useState(0);
            const [scanMode, setScanMode] = useState('food');
            const [textLog, setTextLog] = useState("");
            const [loadingTextLog, setLoadingTextLog] = useState(false);
            const [insights, setInsights] = useState(null);
            const [loadingInsights, setLoadingInsights] = useState(false);
            
            const [isChatOpen, setIsChatOpen] = useState(false);
            const [chatInput, setChatInput] = useState("");
            const [chatMessages, setChatMessages] = useState([{ role: 'model', content: 'สวัสดีครับ! ผมคือ AI โค้ชส่วนตัว มีอะไรให้ช่วยแนะนำไหมครับ? ✨' }]);
            const [isChatting, setIsChatting] = useState(false);

            // ใช้ API Key ของ Qwen (DashScope) ที่ระบุมาเป็นค่าเริ่มต้น
            const [localApiKey, setLocalApiKey] = useState(localStorage.getItem('qwenApiKey') || "sk-f7ca662bbab4484b9fcac11fff166ae3");
            const [showSettings, setShowSettings] = useState(false);

            const fileInputRef = useRef(null);

            useEffect(() => {
                const timer = setTimeout(() => {
                    setSplashStep('finished');
                    // ถ้าไม่มี Key ในระบบเลย ให้เปิดหน้าตั้งค่า
                    if (!localApiKey) {
                        setShowSettings(true);
                    }
                }, 3000);
                const checkSDK = setInterval(() => { if (window.FirebaseSDK) { setIsSDKReady(true); clearInterval(checkSDK); } }, 100);
                return () => { clearTimeout(timer); clearInterval(checkSDK); };
            }, []);

            useEffect(() => {
                if (!isSDKReady) return;
                const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged } = window.FirebaseSDK;
                const appInstance = initializeApp(firebaseConfig);
                const authInstance = getAuth(appInstance);
                signInAnonymously(authInstance).catch((err) => setError(`Firebase Auth Error: ${err.message || err}`));
                const unsubscribe = onAuthStateChanged(authInstance, setUser);
                return () => unsubscribe();
            }, [isSDKReady]);

            useEffect(() => {
                if (!user || !isSDKReady) return;
                const { getFirestore, doc, getDoc, collection, onSnapshot } = window.FirebaseSDK;
                const db = getFirestore();
                const appIdStr = "calorie-ai-pro-glass";

                getDoc(doc(db, 'artifacts', appIdStr, 'users', user.uid, 'settings', 'profile')).then(snap => {
                    if (snap.exists()) {
                        const data = snap.data();
                        setProfile(data);
                        setFormData({ 
                            gender: data.gender || 'male', 
                            age: data.age || '', 
                            weight: data.weight || '', 
                            height: data.height || '', 
                            activity: data.activity || '1.2' 
                        });
                        setStep('dashboard');
                    } else setStep('onboarding');
                }).catch(err => setError(`Fetch Profile Error: ${err.message || err}`));

                const unsubscribeMeals = onSnapshot(collection(db, 'artifacts', appIdStr, 'users', user.uid, 'meals'), (snapshot) => {
                    const todayStr = new Date().toDateString();
                    const filtered = snapshot.docs.map(d => ({ id: d.id, ...d.data() }))
                        .filter(m => m.timestamp && m.timestamp.toDate().toDateString() === todayStr);
                    setDailyLog(filtered.sort((a,b) => b.timestamp - a.timestamp));
                }, (err) => setError(`Meals Sync Error: ${err.message || err}`));

                const unsubscribeWater = onSnapshot(doc(db, 'artifacts', appIdStr, 'users', user.uid, 'water', new Date().toLocaleDateString('en-CA')), (docSnap) => {
                    setWaterIntake(docSnap.exists() ? docSnap.data().amount : 0);
                }, (err) => setError(`Water Sync Error: ${err.message || err}`));

                return () => { unsubscribeMeals(); unsubscribeWater(); };
            }, [user, isSDKReady]);

            const calculateStats = (data) => {
                const { gender, age, weight, height, activity } = data;
                const w = parseFloat(weight); const h = parseFloat(height); const a = parseInt(age); const act = parseFloat(activity);
                if (isNaN(w) || isNaN(h) || isNaN(a)) return { bmr: 0, tdee: 0, bmi: 0 };
                let bmr = gender === 'male' ? (10 * w) + (6.25 * h) - (5 * a) + 5 : (10 * w) + (6.25 * h) - (5 * a) - 161;
                const tdee = Math.round(bmr * act);
                const bmi = (w / ((h / 100) ** 2)).toFixed(1);
                return { bmr: Math.round(bmr), tdee, bmi };
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                if (!user || !isSDKReady) return;
                const { getFirestore, doc, setDoc } = window.FirebaseSDK;
                const db = getFirestore();
                const stats = calculateStats(formData);
                const newProfile = { ...formData, ...stats };
                await setDoc(doc(db, 'artifacts', 'calorie-ai-pro-glass', 'users', user.uid, 'settings', 'profile'), newProfile);
                setProfile(newProfile); 
                setStep('dashboard');
            };

            const handleUpdateProfile = async (e) => {
                e.preventDefault();
                if (!user || !isSDKReady) return;
                const { getFirestore, doc, setDoc } = window.FirebaseSDK;
                const db = getFirestore();
                const stats = calculateStats(formData);
                const newProfile = { ...formData, ...stats };
                await setDoc(doc(db, 'artifacts', 'calorie-ai-pro-glass', 'users', user.uid, 'settings', 'profile'), newProfile);
                setProfile(newProfile); 
                setView('home');
            };

            const saveApiKey = () => {
                localStorage.setItem('qwenApiKey', localApiKey);
                setShowSettings(false);
            };

            const callAI = async (prompt, mimeType = null, base64Data = null) => {
                if (!localApiKey) {
                    setShowSettings(true);
                    throw new Error("กรุณาตั้งค่า API Key ก่อนใช้งาน (ไอคอนฟันเฟืองมุมขวาบน)");
                }
                
                let content = [];
                // ใช้ Qwen Plus สำหรับข้อความทั่วไป
                let targetModel = "qwen-plus"; 
                
                if (mimeType && base64Data) {
                    content = [
                        { type: "text", text: prompt },
                        { type: "image_url", image_url: { url: `data:${mimeType};base64,${base64Data}` } }
                    ];
                    // สลับมาใช้ Qwen Vision Plus สำหรับการอ่านรูปภาพ
                    targetModel = "qwen-vl-plus";
                } else {
                    content = prompt;
                }

                // เชื่อมต่อไปยัง DashScope (Alibaba Cloud) แบบ OpenAI Compatible
                const res = await fetch("https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${localApiKey}`
                    },
                    body: JSON.stringify({
                        model: targetModel,
                        messages: [{ role: "user", content: content }],
                        temperature: 0.2
                    })
                });

                const data = await res.json();
                
                if (data.error) {
                    const errMsg = data.error.message || "";
                    if (errMsg.toLowerCase().includes("invalid api key") || res.status === 401) {
                        throw new Error("API Key ของ Qwen ไม่ถูกต้องหรือหมดอายุ กรุณาตรวจสอบอีกครั้ง");
                    } else if (res.status === 429) {
                        throw new Error("โควต้าการใช้งาน API เต็ม หรือถูกจำกัดการใช้งานชั่วคราว");
                    }
                    throw new Error(errMsg || "เกิดข้อผิดพลาดในการเชื่อมต่อกับ Qwen AI");
                }
                
                const responseText = data.choices[0].message.content;
                return JSON.parse(responseText.replace(/```json|```/g, '').trim());
            };

            const handleAnalyze = async () => {
                setLoading(true); setError(null);
                try {
                    const reader = new FileReader();
                    const base64 = await new Promise(r => { reader.onload = () => r(reader.result.split(',')[1]); reader.readAsDataURL(image); });
                    
                    const prompt = scanMode === 'label'
                        ? `Extract nutrition data from this nutrition label image. You MUST return ONLY a valid JSON object in this exact format, without any extra text or markdown: { "food_name": "Product Name (or 'ไม่ทราบชื่อ' if unreadable)", "calories": integer, "protein": integer, "carbs": integer, "fat": integer, "summary": "Short Thai summary. If data is unclear, guess based on common product types." }.`
                        : `Analyze this food image. You MUST return ONLY a valid JSON object in this exact format, without any extra text or markdown: { "food_name": "Thai Food Name", "calories": integer (estimate carefully based on portion), "protein": integer, "carbs": integer, "fat": integer, "summary": "Short Thai description. Consider portion size." }. ${userHint ? `Additional Context: ${userHint}` : ''}`;
                        
                    const parsed = await callAI(prompt, image.type, base64);
                    
                    const finalResult = {
                        food_name: parsed.food_name || "อาหารไม่ทราบชื่อ",
                        calories: parsed.calories || 0,
                        protein: parsed.protein || 0,
                        carbs: parsed.carbs || 0,
                        fat: parsed.fat || 0,
                        summary: parsed.summary || "ไม่สามารถวิเคราะห์รายละเอียดได้ชัดเจน"
                    };
                    
                    setResult(finalResult); 
                    setView('result');
                } catch (err) { 
                    console.error("Analysis Error:", err);
                    setError(`Analysis Error: ${err.message || err}`); 
                } finally { setLoading(false); }
            };

            const handleTextLog = async () => {
                if (!textLog.trim()) return;
                setLoadingTextLog(true); setError(null);
                try {
                    const parsed = await callAI(`Convert this text into nutrition data: "${textLog}". You MUST return ONLY a valid JSON object in this exact format: { "food_name": "String", "calories": integer, "protein": integer, "carbs": integer, "fat": integer, "summary": "Short Thai summary" }`);
                    
                    const finalResult = {
                        food_name: parsed.food_name || textLog,
                        calories: parsed.calories || 0,
                        protein: parsed.protein || 0,
                        carbs: parsed.carbs || 0,
                        fat: parsed.fat || 0,
                        summary: parsed.summary || "บันทึกจากข้อความ"
                    };

                    setResult(finalResult); 
                    setView('result'); 
                    setTextLog("");
                } catch (err) { 
                    console.error("Text Log Error:", err);
                    setError(`Text Log Error: ${err.message || err}`); 
                } finally { setLoadingTextLog(false); }
            };

            const saveMeal = async () => {
                try {
                    const { getFirestore, collection, addDoc, serverTimestamp } = window.FirebaseSDK;
                    await addDoc(collection(getFirestore(), 'artifacts', 'calorie-ai-pro-glass', 'users', user.uid, 'meals'), { ...result, mealType, timestamp: serverTimestamp() });
                    setView('home'); setImagePreview(null); setResult(null);
                } catch (err) {
                    console.error("Save Meal Error:", err);
                    setError(`Save Error: ${err.message || err}`);
                }
            };

            const handleAddWater = async (amount) => {
                try {
                    const { getFirestore, doc, setDoc } = window.FirebaseSDK;
                    const newAmount = Math.max(0, waterIntake + amount);
                    await setDoc(doc(getFirestore(), 'artifacts', 'calorie-ai-pro-glass', 'users', user.uid, 'water', new Date().toLocaleDateString('en-CA')), { amount: newAmount }, { merge: true });
                } catch (err) {
                    console.error("Add Water Error:", err);
                    setError(`Water Sync Error: ${err.message || err}`);
                }
            };

            const handleSendMessage = async () => {
                if (!chatInput.trim()) return;
                const newChat = [...chatMessages, { role: 'user', content: chatInput }];
                setChatMessages(newChat); setChatInput(""); setIsChatting(true);
                try {
                    const parsed = await callAI(`Nutrition coach context. History: ${JSON.stringify(newChat)}. You MUST return ONLY a valid JSON object in this exact format: { "reply": "Brief Thai reply" }`);
                    setChatMessages([...newChat, { role: 'model', content: parsed.reply }]);
                } catch (err) { 
                    console.error("Chat Error:", err);
                    setChatMessages([...newChat, { role: 'model', content: `ระบบขัดข้อง: ${err.message || err}` }]); 
                }
                finally { setIsChatting(false); }
            };

            const handleGetInsights = async () => {
                setLoadingInsights(true);
                try {
                    const logStr = dailyLog.map(m => `${m.food_name}(${m.calories})`).join(', ');
                    const parsed = await callAI(`Analyze eating habits: ${logStr} (Target: ${profile?.tdee}). You MUST return ONLY a valid JSON object in this exact format: { "insight": "Thai text", "score": integer }`);
                    setInsights(parsed);
                } catch (err) { 
                    console.error("Insights Error:", err);
                    setError(`Insights Error: ${err.message || err}`);
                }
                finally { setLoadingInsights(false); }
            };

            const consumed = dailyLog.reduce((s, m) => s + (m.calories || 0), 0);
            const progress = profile?.tdee ? Math.min((consumed / profile.tdee) * 100, 100) : 0;

            // --- UI Rendering ---
            if (splashStep !== 'finished') return (
                <div className="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-white">
                    <Background />
                    <dotlottie-wc src="https://lottie.host/78ddc33b-4844-4fc1-873e-7b41c27384ff/iKB3yDnm5e.lottie" style={{ width: '300px', height: '300px' }} autoplay loop />
                    <p className="text-teal-600 font-bold text-lg animate-pulse mt-4">กำลังเตรียมระบบ AI...</p>
                </div>
            );

            if (step === 'loading') return (
                <div className="min-h-screen relative flex flex-col items-center justify-center p-6 text-center">
                    <Background />
                    <div className="glass-panel p-10 rounded-[40px] shadow-2xl animate-in max-w-xs border border-white/50">
                        <div className="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600 mx-auto mb-6"><Icon name="Utensils" size={40} /></div>
                        <h1 className="text-3xl font-black text-slate-900 mb-2 leading-tight">ยินดีต้อนรับ</h1>
                        <p className="text-slate-500 text-sm mb-8 leading-relaxed">พร้อมดูแลสุขภาพของคุณด้วยระบบสแกนอาหารอัจฉริยะหรือยัง?</p>
                        <button onClick={() => setStep('checking')} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-lg shadow-xl active:scale-95 transition-all flex items-center justify-center space-x-2"><span>เริ่มนับแคลกันเถอะ</span><Icon name="ArrowRight" size={20} /></button>
                    </div>
                </div>
            );

            if (step === 'onboarding') return (
                <div className="min-h-screen relative p-6 flex flex-col justify-center max-w-md mx-auto text-left">
                    <Background />
                    <div className="glass-panel p-8 rounded-[40px] text-center shadow-xl animate-in">
                        <div className="w-16 h-16 bg-teal-500 mx-auto rounded-3xl flex items-center justify-center text-white mb-4"><Icon name="Activity" size={32} /></div>
                        <h1 className="text-2xl font-bold mb-2 text-slate-900">ระบุข้อมูลของคุณ</h1>
                        <form onSubmit={handleRegister} className="space-y-4">
                            <div className="flex bg-white/40 p-1 rounded-2xl border border-white/50">
                                {['male', 'female'].map(g => (<button key={g} type="button" onClick={() => setFormData({...formData, gender: g})} className={`flex-1 py-3 rounded-xl font-bold text-sm transition-all ${formData.gender === g ? 'bg-white shadow text-teal-700' : 'text-slate-400'}`}>{g === 'male' ? 'ชาย' : 'หญิง'}</button>))}
                            </div>
                            <div className="grid grid-cols-2 gap-4 text-left">
                                <Input label="น้ำหนัก (กก.)" value={formData.weight} onChange={v => setFormData({...formData, weight: v})} />
                                <Input label="ส่วนสูง (ซม.)" value={formData.height} onChange={v => setFormData({...formData, height: v})} />
                            </div>
                            <Input label="อายุ (ปี)" value={formData.age} onChange={v => setFormData({...formData, age: v})} />
                            <div className="text-left space-y-1">
                                <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-2">ระดับกิจกรรม</label>
                                <select value={formData.activity} onChange={e => setFormData({...formData, activity: e.target.value})} className="w-full glass-card p-4 rounded-2xl text-sm outline-none appearance-none text-slate-800 shadow-sm"><option value="1.2">นั่งทำงานเป็นหลัก</option><option value="1.375">ออกกำลังเบา (1-3 วัน)</option><option value="1.55">ออกกำลังปานกลาง (3-5 วัน)</option><option value="1.725">ออกกำลังหนัก (6-7 วัน)</option></select>
                            </div>
                            <button type="submit" className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-lg shadow-xl mt-4 active:scale-95 transition-all">บันทึกข้อมูล</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen relative pb-32 max-w-md mx-auto">
                    <Background />
                    
                    {/* Settings Modal */}
                    {showSettings && (
                        <div className="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-slate-900/40 backdrop-blur-sm p-6 text-left">
                            <div className="glass-panel p-8 rounded-[40px] shadow-2xl w-full max-w-sm border-white animate-in bg-white/80">
                                <h2 className="text-xl font-bold mb-2 text-slate-800 flex items-center space-x-2"><Icon name="Settings" size={20} className="text-teal-600"/><span>ตั้งค่า Qwen AI</span></h2>
                                <p className="text-xs text-slate-500 mb-6 leading-relaxed">ระบุ API Key จาก DashScope (Alibaba Cloud) ของคุณ เพื่อใช้ประมวลผล</p>
                                
                                <div className="space-y-1 mb-6 text-left">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-2">DashScope API Key</label>
                                    <input 
                                        type="password" 
                                        value={localApiKey} 
                                        onChange={e => setLocalApiKey(e.target.value)} 
                                        placeholder="sk-..." 
                                        className="w-full glass-card p-4 rounded-2xl text-sm outline-none focus:ring-2 focus:ring-teal-400 transition-all text-slate-800 shadow-sm"
                                    />
                                </div>
                                
                                <div className="flex space-x-2">
                                    <button onClick={() => setShowSettings(false)} className="flex-1 bg-white/50 py-3 rounded-2xl font-bold text-sm text-slate-500 border border-white hover:bg-white/70">ยกเลิก</button>
                                    <button onClick={saveApiKey} className="flex-[2] bg-teal-600 text-white py-3 rounded-2xl font-bold text-sm shadow-lg hover:bg-teal-700">บันทึก Key</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <header className="glass-nav px-8 pt-12 pb-8 rounded-b-[48px] relative z-20">
                        <div className="flex justify-between items-center mb-8">
                            <div className="flex items-center space-x-3 cursor-pointer" onClick={() => setView('profile')}>
                                <div className="w-11 h-11 bg-white border border-white rounded-2xl flex items-center justify-center text-teal-600 shadow-sm"><Icon name="User" size={20}/></div>
                                <div className="text-left">
                                    <p className="text-[10px] font-bold text-teal-700 uppercase tracking-wider flex items-center">โปรไฟล์ <Icon name="Edit3" size={10} className="ml-1 opacity-50"/></p>
                                    <p className="text-sm font-bold text-slate-800">BMI: {profile?.bmi || '-'}</p>
                                </div>
                            </div>
                            <div className="flex items-center space-x-4">
                                <button onClick={() => setShowSettings(true)} className="text-teal-700 opacity-70 hover:opacity-100 transition-opacity"><Icon name="Settings" size={22}/></button>
                                <div className="text-right">
                                    <p className="text-[10px] font-bold text-teal-700 uppercase tracking-wider">TDEE Goal</p>
                                    <p className="text-sm font-bold text-slate-800">{profile?.tdee || 0} kcal</p>
                                </div>
                            </div>
                        </div>
                        <div className="flex flex-col items-center">
                            <div className="relative w-56 h-56 flex items-center justify-center">
                                <svg className="w-full h-full -rotate-90"><circle cx="112" cy="112" r="100" fill="transparent" stroke="rgba(255,255,255,0.4)" strokeWidth="16" /><circle cx="112" cy="112" r="100" fill="transparent" stroke="#10b981" strokeWidth="16" strokeDasharray={628} strokeDashoffset={628 - (628 * progress) / 100} strokeLinecap="round" className="transition-all duration-1000 ease-out" /></svg>
                                <div className="absolute text-center glass-panel rounded-full w-36 h-36 flex flex-col items-center justify-center border-white shadow-inner"><p className="text-5xl font-black text-slate-800">{consumed}</p><p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Eaten</p></div>
                            </div>
                        </div>
                    </header>

                    <main className="px-6 mt-6 relative z-10 space-y-6">
                        {error && (
                            <div className="p-4 bg-red-50 text-red-600 rounded-2xl text-xs flex items-start space-x-2 animate-in text-left border border-red-100 overflow-auto break-words max-h-40">
                                <Icon name="AlertCircle" size={16} className="mt-0.5 flex-shrink-0" />
                                <span className="flex-1 font-mono leading-relaxed">{error}</span>
                                <button onClick={() => setError(null)} className="p-1 hover:bg-red-100 rounded-md transition-colors"><Icon name="X" size={14}/></button>
                            </div>
                        )}
                        {view === 'home' && (
                            <>
                                <div className="glass-panel rounded-3xl p-3 flex items-center space-x-3 shadow-sm"><input type="text" value={textLog} onChange={e => setTextLog(e.target.value)} placeholder="กินอะไรไป? พิมพ์บันทึกที่นี่..." className="flex-1 bg-transparent text-sm outline-none px-2 text-slate-800" onKeyDown={e => e.key === 'Enter' && handleTextLog()} /><button onClick={handleTextLog} className="p-2 bg-teal-500 text-white rounded-full shadow active:scale-90" disabled={loadingTextLog}>{loadingTextLog ? <Icon name="RefreshCw" size={16} className="animate-spin" /> : <Icon name="Send" size={16} />}</button></div>
                                <div onClick={() => { setImagePreview(null); setView('camera'); fileInputRef.current.click(); }} className="glass-panel p-6 rounded-[32px] shadow flex items-center justify-between cursor-pointer active:scale-95 transition-all"><div className="flex items-center space-x-4 text-left"><div className="w-14 h-14 bg-teal-500 rounded-2xl flex items-center justify-center text-white shadow-lg"><Icon name="Camera" size={26} /></div><div><h3 className="font-bold text-lg text-slate-800">สแกนอาหาร</h3><p className="text-xs text-slate-500">วิเคราะห์อาหารด้วยรูปถ่าย</p></div></div><Icon name="Plus" size={24} className="text-teal-600"/></div>
                                <div className="bg-blue-50/60 glass-panel rounded-[32px] p-6 flex items-center justify-between shadow-sm"><div className="flex items-center space-x-4 text-left"><div className="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-blue-500 shadow-sm"><Icon name="Droplets" size={24} /></div><div><h3 className="font-bold text-sm text-slate-800">ดื่มน้ำ</h3><p className="text-xs text-slate-500">{waterIntake}/8 แก้ว</p></div></div><div className="flex space-x-2"><button onClick={() => handleAddWater(-1)} className="w-8 h-8 rounded-full bg-white text-blue-500 font-bold border border-blue-50 shadow-sm">-</button><button onClick={() => handleAddWater(1)} className="w-10 h-10 rounded-full bg-blue-500 text-white font-bold shadow-md">+</button></div></div>
                                <div className="glass-panel rounded-[36px] p-6 text-left shadow-sm"><h3 className="text-base font-bold flex items-center space-x-2 mb-4 text-slate-800"><Icon name="History" size={18} className="text-teal-600"/><span>ประวัติวันนี้</span></h3><div className="space-y-3">{dailyLog.length === 0 ? <p className="text-center text-slate-400 py-4 text-[10px] uppercase font-bold tracking-widest">ยังไม่มีรายการ</p> : dailyLog.map(m => (<div key={m.id} className="glass-card p-4 rounded-2xl flex items-center justify-between shadow-sm animate-in"><div className="flex items-center space-x-3 text-left"><div className="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-teal-600 font-black text-xs border border-slate-100">{m.mealType?.[0] || 'M'}</div><div><p className="font-bold text-sm text-slate-800">{m.food_name}</p><p className="text-[10px] text-slate-400 font-bold uppercase">{m.mealType} • {m.calories} kcal</p></div></div></div>))}</div></div>
                            </>
                        )}
                        {view === 'camera' && (
                            <div className="space-y-6 animate-in">
                                <div className="flex glass-panel p-1 rounded-2xl mx-auto w-3/4 shadow-inner"><button onClick={() => setScanMode('food')} className={`flex-1 py-2 rounded-xl font-bold text-xs transition-all ${scanMode === 'food' ? 'bg-white shadow text-teal-600' : 'text-slate-400'}`}>เมนูอาหาร</button><button onClick={() => setScanMode('label')} className={`flex-1 py-2 rounded-xl font-bold text-xs transition-all ${scanMode === 'label' ? 'bg-white shadow text-teal-600' : 'text-slate-400'}`}>ฉลากโภชนาการ</button></div>
                                {imagePreview && (<div className="rounded-[40px] overflow-hidden shadow-2xl aspect-[4/5] relative border-4 border-white bg-black shadow-lg"><img src={imagePreview} className="w-full h-full object-cover opacity-90" /><button onClick={() => setView('home')} className="absolute top-4 left-4 bg-white/20 backdrop-blur-md p-3 rounded-2xl text-white active:scale-90 transition-all"><Icon name="ChevronLeft"/></button></div>)}
                                <div className="glass-panel p-4 rounded-3xl text-left"><div className="flex items-center space-x-2 text-slate-500 mb-2"><Icon name="Info" size={14}/> <span className="text-[10px] font-bold uppercase tracking-widest text-slate-400">ข้อมูลเพิ่มเติม (เช่น ข้าวมันไก่)</span></div><input value={userHint} onChange={e => setUserHint(e.target.value)} placeholder="พิมพ์ชื่อเมนูเพื่อความแม่นยำ..." className="w-full bg-transparent text-sm outline-none px-1 text-slate-800" /></div>
                                <button onClick={handleAnalyze} disabled={loading} className="w-full bg-slate-900 text-white py-5 rounded-[24px] font-bold text-lg shadow-xl active:scale-95 disabled:opacity-50 transition-all">{loading ? <Icon name="RefreshCw" className="animate-spin inline-block mr-2" /> : <Icon name="Activity" className="inline-block mr-2" />}<span>{loading ? 'กำลังวิเคราะห์...' : 'เริ่มวิเคราะห์ข้อมูล'}</span></button>
                            </div>
                        )}
                        {view === 'result' && result && (
                            <div className="animate-in text-center"><div className="glass-panel p-8 rounded-[40px] border-white shadow-xl"><h2 className="text-2xl font-black mb-1 text-slate-800">{result.food_name}</h2><p className="text-slate-500 text-xs mb-8">{result.summary}</p><div className="inline-flex flex-col bg-emerald-500 text-white px-8 py-5 rounded-[32px] shadow-lg mb-8 border-4 border-emerald-400/30"><span className="text-5xl font-black">{result.calories}</span><span className="text-[10px] uppercase font-bold mt-1 tracking-widest">kcal</span></div><div className="grid grid-cols-3 gap-3 mb-8"><Macro label="Protein" value={result.protein} color="text-sky-600" /><Macro label="Carbs" value={result.carbs} color="text-fuchsia-600" /><Macro label="Fat" value={result.fat} color="text-amber-600" /></div><div className="text-left mb-6"><label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block text-center mb-2">เลือกมื้ออาหาร</label><div className="grid grid-cols-2 gap-2">{['Breakfast', 'Lunch', 'Dinner', 'Snack'].map(type => (<button key={type} onClick={() => setMealType(type)} className={`py-3 rounded-xl font-bold text-xs border ${mealType === type ? 'bg-teal-500 text-white border-teal-400 shadow-sm' : 'bg-white/50 text-slate-500 border-white/80'}`}>{type}</button>))}</div></div><button onClick={saveMeal} className="w-full bg-slate-800 text-white py-5 rounded-[24px] font-bold text-lg shadow-xl active:scale-95 transition-all"><Icon name="CheckCircle2" className="inline mr-2"/>บันทึกข้อมูลมื้อนี้</button></div></div>
                        )}
                        {view === 'history' && (
                            <div className="space-y-6 animate-in text-left">
                                <div className="glass-panel rounded-[36px] p-6 shadow-sm"><h3 className="font-bold flex items-center space-x-2 text-slate-800 mb-4"><Icon name="Sparkles" className="text-amber-500" size={20}/><span>AI วิเคราะห์สุขภาพ</span></h3>{!insights ? (<button onClick={handleGetInsights} disabled={loadingInsights} className="w-full py-4 rounded-2xl bg-teal-500 text-white font-bold text-sm shadow active:scale-95 transition">{loadingInsights ? <Icon name="RefreshCw" size={18}/> : 'วิเคราะห์พฤติกรรมวันนี้'}</button>) : (<div className="space-y-4 animate-in"><div className="flex items-center space-x-4"><div className="w-14 h-14 rounded-full bg-white border-4 border-amber-200 flex items-center justify-center text-amber-500 font-black text-lg shadow-inner">{insights.score}</div><div><p className="font-bold text-xs uppercase tracking-widest text-slate-400 leading-none">Healthy Score</p><p className="text-sm font-bold text-slate-700 mt-1">{insights.score > 80 ? 'ดีเยี่ยม!' : insights.score > 50 ? 'ปกติ' : 'ควรดูแลเพิ่ม'}</p></div></div><p className="glass-card p-4 rounded-2xl text-sm leading-relaxed border-white text-slate-700 italic">"{insights.insight}"</p><button onClick={() => setInsights(null)} className="text-[10px] w-full text-slate-400 font-bold uppercase mt-2 text-center py-2">ปิด</button></div>)}</div>
                                <div className="space-y-3">{dailyLog.map(m => (<div key={m.id} className="glass-card p-4 rounded-2xl flex items-center justify-between shadow-sm animate-in"><div className="flex items-center space-x-3 text-left"><div className="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-teal-600 font-black text-xs border border-slate-100">{m.mealType?.[0] || 'M'}</div><div><p className="font-bold text-sm text-slate-800">{m.food_name}</p><p className="text-[10px] text-slate-400 font-bold uppercase">{m.mealType} • {m.calories} kcal</p></div></div></div>))}</div>
                            </div>
                        )}
                        {view === 'profile' && (
                            <div className="space-y-6 text-left animate-in"><div className="glass-panel p-8 rounded-[40px] border-white shadow-xl"><h3 className="font-bold text-slate-800 flex items-center space-x-2 mb-6"><Icon name="User" className="text-teal-600" size={20}/><span>แก้ไขโปรไฟล์</span></h3><form onSubmit={handleUpdateProfile} className="space-y-5"><div className="grid grid-cols-2 gap-4"><Input label="น้ำหนัก (กก.)" value={formData.weight} onChange={v => setFormData({...formData, weight: v})} /><Input label="ส่วนสูง (ซม.)" value={formData.height} onChange={v => setFormData({...formData, height: v})} /></div><Input label="อายุ (ปี)" value={formData.age} onChange={v => setFormData({...formData, age: v})} /><div className="space-y-1"><label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-2">ระดับกิจกรรม</label><select value={formData.activity} onChange={e => setFormData({...formData, activity: e.target.value})} className="w-full glass-card p-4 rounded-2xl text-sm outline-none appearance-none text-slate-800 shadow-sm"><option value="1.2">นั่งทำงานเป็นหลัก</option><option value="1.375">ออกกำลังเบา (1-3 วัน)</option><option value="1.55">ออกกำลังปานกลาง (3-5 วัน)</option><option value="1.725">ออกกำลังหนัก (6-7 วัน)</option></select></div><div className="flex space-x-2 pt-4"><button type="button" onClick={() => setView('home')} className="flex-1 bg-white/50 py-4 rounded-2xl font-bold text-sm text-slate-400 border border-white active:scale-95 transition-all">ยกเลิก</button><button type="submit" className="flex-[2] bg-teal-600 text-white py-4 rounded-2xl font-bold text-sm shadow-lg active:scale-95 transition-all">บันทึกข้อมูล</button></div></form></div></div>
                        )}
                    </main>

                    {isChatOpen && (
                        <div className="fixed inset-0 z-[60] flex flex-col justify-end text-left"><div className="absolute inset-0 bg-slate-900/10 backdrop-blur-sm" onClick={() => setIsChatOpen(false)}></div><div className="bg-white/90 glass-panel h-[70vh] rounded-t-[40px] shadow-2xl flex flex-col relative z-10 animate-in border-t border-white/60"><div className="flex justify-between items-center p-6 border-b border-white/50"><div className="flex items-center space-x-3"><div className="bg-teal-100 text-teal-600 p-2 rounded-xl"><Icon name="MessageCircle" size={20}/></div><h3 className="font-bold text-slate-800">ถาม AI โค้ช</h3></div><button onClick={() => setIsChatOpen(false)} className="p-2 bg-slate-100 rounded-full text-slate-400 shadow-sm hover:bg-slate-200 transition-colors"><Icon name="X" size={20}/></button></div><div className="flex-1 overflow-y-auto p-6 space-y-4">{chatMessages.map((msg, i) => (<div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}><div className={`max-w-[80%] p-4 rounded-[22px] text-sm leading-relaxed shadow-sm ${msg.role === 'user' ? 'bg-teal-500 text-white rounded-tr-none' : 'glass-card text-slate-700 rounded-tl-none'}`}>{msg.content}</div></div>))}{isChatting && <div className="text-teal-500 flex items-center space-x-2 animate-pulse"><Icon name="RefreshCw" size={14} className="animate-spin"/><span className="text-xs font-bold">AI กำลังประมวลผล...</span></div>}</div><div className="p-4 bg-white/50 border-t border-white/80"><div className="flex items-center bg-white p-2 rounded-full shadow-inner border border-slate-100"><input type="text" value={chatInput} onChange={e => setChatInput(e.target.value)} placeholder="พิมพ์ข้อความคุยกับเรา..." className="flex-1 px-4 text-sm outline-none bg-transparent text-slate-800" onKeyDown={e => e.key === 'Enter' && handleSendMessage()} /><button onClick={handleSendMessage} disabled={isChatting || !chatInput} className="bg-teal-500 text-white p-3 rounded-full shadow active:scale-90 transition-all disabled:opacity-50"><Icon name="Send" size={18}/></button></div></div></div></div>
                    )}
                    <button onClick={() => setIsChatOpen(true)} className="fixed bottom-32 right-6 w-14 h-14 bg-teal-500 rounded-full flex items-center justify-center text-white shadow-xl z-40 active:scale-90 border-4 border-white transition-transform hover:scale-105 shadow-teal-500/30"><Icon name="MessageCircle" size={24}/></button>
                    <nav className="fixed bottom-6 left-6 right-6 glass-nav h-20 rounded-[36px] flex items-center justify-around px-2 z-50 shadow-xl border-t border-white/40"><button onClick={() => setView('home')} className={`p-4 rounded-2xl transition-all ${view === 'home' ? 'text-teal-600 bg-white shadow-sm' : 'text-slate-400 hover:text-slate-500'}`}><Icon name="Utensils" size={24}/></button><button onClick={() => { setImagePreview(null); setView('camera'); fileInputRef.current.click(); }} className="w-16 h-16 bg-gradient-to-br from-teal-500 to-emerald-500 text-white rounded-[24px] flex items-center justify-center shadow-lg active:scale-90 -mt-12 border-4 border-white transition-transform hover:rotate-12"><Icon name="Plus" size={32}/></button><button onClick={() => setView('history')} className={`p-4 rounded-2xl transition-all ${view === 'history' ? 'text-teal-600 bg-white shadow-sm' : 'text-slate-400 hover:text-slate-500'}`}><Icon name="PieChart" size={24}/></button></nav>
                    <input type="file" accept="image/*" capture="environment" onChange={(e) => { const file = e.target.files[0]; if (file) { setImage(file); setImagePreview(URL.createObjectURL(file)); setView('camera'); } }} ref={fileInputRef} className="hidden" />
                </div>
            );
        }

        function Background() { return (<div className="fixed inset-0 z-[-1] overflow-hidden bg-slate-50"><div className="absolute top-[-10%] left-[-10%] w-[80vw] h-[80vw] rounded-full bg-emerald-200/40 blur-[100px] animate-pulse"></div><div className="absolute bottom-[-10%] right-[-10%] w-[80vw] h-[80vw] rounded-full bg-teal-200/50 blur-[100px]"></div><div className="absolute inset-0 bg-white/20 backdrop-blur-[4px]"></div></div>); }
        function Input({ label, value, onChange }) { return (<div className="space-y-1 text-left"><label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-2">{label}</label><input required type="number" value={value} onChange={e => onChange(e.target.value)} className="w-full glass-card p-4 rounded-2xl text-sm outline-none focus:ring-2 focus:ring-teal-400 transition-all text-slate-800 shadow-sm" /></div>); }
        function Macro({ label, value, color }) { return (<div className="glass-card p-4 rounded-[24px] border-white shadow-sm flex flex-col items-center flex-1 text-center"><p className={`text-[9px] font-black uppercase tracking-wider mb-1 ${color}`}>{label}</p><p className="text-xl font-black text-slate-800 tracking-tighter">{value}<span className="text-[10px] ml-0.5 opacity-50 font-bold">g</span></p></div>); }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
