<!doctype html>
<html lang="th" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NubCal - สมุดจดแคลอรีอัจฉริยะ</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- React & Tailwind CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.3/dist/dotlottie-wc.js" type="module"></script>
    
    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: #f8fafc; 
            margin: 0; 
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden; 
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDK Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, addDoc, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Export Firebase to global window for Babel script to use
        window.FirebaseSDK = { 
            initializeApp, getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, addDoc, serverTimestamp, orderBy,
            getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword 
        };
    </script>

    <!-- React Application -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Icons Component ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                Camera: <><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>,
                RefreshCw: <><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></>,
                Activity: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>,
                AlertCircle: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>,
                Utensils: <><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></>,
                Plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
                History: <><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><polyline points="12 7 12 12 15 15"/></>,
                CheckCircle2: <><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></>,
                User: <><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
                ChevronLeft: <polyline points="15 18 9 12 15 6"/>,
                PieChart: <><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></>,
                Droplets: <><path d="M7 16.3c2.2 0 4-1.8 4-4 0-3.3-4-6.3-4-6.3s-4 3-4 6.3c0 2.2 1.8 4 4 4Z"/><path d="M17 18.5c1.1 0 2-1.1 2-2.5 0-2.4-2-4-2-4s-2 1.6-2 4c0 1.4.9 2.5 2 2.5Z"/></>,
                MessageCircle: <path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/>,
                Send: <><line x1="22" y1="2" x2="11" y2="13"/><polyline points="22 2 15 22 11 13 2 9 22 2"/></>,
                Sparkles: <><path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"/></>,
                X: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
                Edit3: <><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></>,
                LogOut: <><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>,
                CalendarDays: <><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></>,
                Target: <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>,
                ChevronRight: <polyline points="9 18 15 12 9 6"/>,
                Search: <><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const foodDatabase = [
            { id: 1, food_name: 'ข้าวมันไก่', calories: 596, protein: 18, carbs: 70, fat: 25, summary: 'อาหารจานเดียว (เนื้อไก่ติดหนัง)' },
            { id: 2, food_name: 'ข้าวกะเพราหมูสับ', calories: 580, protein: 22, carbs: 65, fat: 26, summary: 'อาหารตามสั่งรสจัด' },
            { id: 3, food_name: 'ไข่เจียว (1 ฟอง)', calories: 250, protein: 7, carbs: 2, fat: 22, summary: 'ทอดน้ำมันปกติ' },
            { id: 4, food_name: 'ไข่ต้ม (1 ฟอง)', calories: 75, protein: 7, carbs: 1, fat: 5, summary: 'ต้มสุก' },
            { id: 5, food_name: 'ก๋วยเตี๋ยวเส้นเล็กหมูน้ำใส', calories: 350, protein: 15, carbs: 50, fat: 10, summary: 'ก๋วยเตี๋ยวน้ำ' },
            { id: 6, food_name: 'ส้มตำไทย', calories: 120, protein: 4, carbs: 25, fat: 2, summary: 'รสเปรี้ยวหวาน' },
            { id: 7, food_name: 'ข้าวสวย (1 ทัพพี)', calories: 80, protein: 2, carbs: 18, fat: 0, summary: 'ข้าวขาว' },
            { id: 8, food_name: 'ชาไทยเย็น', calories: 320, protein: 4, carbs: 45, fat: 14, summary: 'หวานปกติ' },
            { id: 9, food_name: 'สลัดผักไก่ย่าง', calories: 280, protein: 25, carbs: 15, fat: 12, summary: 'น้ำสลัดใส' }
        ];

        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyCKSPlMznK713bLuSyR3b7Kj1BJcCuQeJI",
            authDomain: "nubcal-cbd69.firebaseapp.com",
            projectId: "nubcal-cbd69",
            storageBucket: "nubcal-cbd69.firebasestorage.app",
            messagingSenderId: "44640039163",
            appId: "1:44640039163:web:6ae6d2573f26e08ee4805e",
            measurementId: "G-4EHW3MLZ4G"
        };

        function App() {
            const [isSDKReady, setIsSDKReady] = useState(false);
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [step, setStep] = useState('loading'); 
            const [view, setView] = useState('home'); 
            const [viewDate, setViewDate] = useState(new Date());
            const [allMeals, setAllMeals] = useState([]);
            
            const [formData, setFormData] = useState({
                gender: 'male', age: '', weight: '', height: '', activity: '1.2', targetWeight: ''
            });

            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);
            const [mealType, setMealType] = useState('Breakfast');
            const [waterIntake, setWaterIntake] = useState(0);
            
            // Search & Manual Entry States
            const [searchTerm, setSearchTerm] = useState("");
            const [manualEntry, setManualEntry] = useState({ food_name: '', calories: '', protein: '', carbs: '', fat: '' });
            
            // Email/Password Auth States
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [isSignUp, setIsSignUp] = useState(false);

            const appIdStr = 'calorie-ai-pro-glass';

            // Wait for Firebase SDK to load from CDN
            useEffect(() => {
                const checkSDK = setInterval(() => {
                    if (window.FirebaseSDK) {
                        setIsSDKReady(true);
                        clearInterval(checkSDK);
                    }
                }, 100);
                return () => clearInterval(checkSDK);
            }, []);

            // Firebase Initialization & Auth state listener
            useEffect(() => {
                if (!isSDKReady) return;
                
                const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = window.FirebaseSDK;
                
                let appInstance;
                try {
                    appInstance = initializeApp(firebaseConfig);
                } catch(e) {
                    appInstance = initializeApp(firebaseConfig, "main-app");
                }
                
                const authInstance = getAuth(appInstance);

                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try {
                                await signInWithCustomToken(authInstance, __initial_auth_token);
                            } catch (tokenErr) {
                                console.warn("Token mismatch, falling back to anonymous", tokenErr);
                                await signInAnonymously(authInstance);
                            }
                        } else {
                            setStep('login');
                        }
                    } catch (err) {
                        console.error("Auth init error:", err);
                        if (err?.code === 'auth/unauthorized-domain') {
                            setError("โดเมนนี้ยังไม่ได้รับอนุญาตใน Firebase ของคุณ (auth/unauthorized-domain)");
                        }
                        setStep('login');
                    }
                };

                initAuth();

                const unsubscribe = onAuthStateChanged(authInstance, (currentUser) => {
                    setUser(currentUser);
                    if (!currentUser) setStep('login');
                });
                return () => unsubscribe();
            }, [isSDKReady]);

            // Data Fetching
            useEffect(() => {
                if (!user || !isSDKReady) return;
                
                const { getFirestore, doc, getDoc, collection, onSnapshot, initializeApp } = window.FirebaseSDK;
                let appInstance;
                try { appInstance = initializeApp(firebaseConfig); } 
                catch(e) { appInstance = initializeApp(firebaseConfig, "fetch-app"); }
                
                const dbInstance = getFirestore(appInstance);

                // Fetch Profile
                getDoc(doc(dbInstance, 'artifacts', appIdStr, 'users', user.uid, 'settings', 'profile')).then(snap => {
                    if (snap.exists()) {
                        const data = snap.data();
                        setProfile(data);
                        setFormData({
                            gender: data.gender || 'male', age: data.age || '',
                            weight: data.weight || '', height: data.height || '', activity: data.activity || '1.2',
                            targetWeight: data.targetWeight || ''
                        });
                        setStep('dashboard');
                    } else {
                        setStep('onboarding');
                    }
                }).catch(() => setStep('onboarding'));

                // Listen Meals
                const unsubscribeMeals = onSnapshot(collection(dbInstance, 'artifacts', appIdStr, 'users', user.uid, 'meals'), (snapshot) => {
                    const mealsData = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    setAllMeals(mealsData);
                }, (err) => console.error("Meals listener error", err));

                // Listen Water
                const todayStr = new Date().toLocaleDateString('en-CA'); 
                const unsubscribeWater = onSnapshot(doc(dbInstance, 'artifacts', appIdStr, 'users', user.uid, 'water', todayStr), (docSnap) => {
                    setWaterIntake(docSnap.exists() ? docSnap.data().amount || 0 : 0);
                }, (err) => console.error("Water listener error", err));

                return () => { unsubscribeMeals(); unsubscribeWater(); };
            }, [user, isSDKReady]);

            // Handlers
            const getAuthInstance = () => {
                const { getAuth, initializeApp } = window.FirebaseSDK;
                let appInstance;
                try { appInstance = initializeApp(firebaseConfig); } 
                catch(e) { appInstance = initializeApp(firebaseConfig, "auth-app"); }
                return getAuth(appInstance);
            };

            const handleEmailAuth = async (e) => {
                e.preventDefault();
                setError(null);
                if (!email || !password) return setError("กรุณากรอกอีเมลและรหัสผ่านให้ครบถ้วน");
                
                try {
                    const authInstance = getAuthInstance();
                    const { createUserWithEmailAndPassword, signInWithEmailAndPassword } = window.FirebaseSDK;
                    if (isSignUp) await createUserWithEmailAndPassword(authInstance, email, password);
                    else await signInWithEmailAndPassword(authInstance, email, password);
                } catch (err) {
                    if (err.code === 'auth/email-already-in-use') setError("อีเมลนี้ถูกใช้งานแล้ว กรุณาเข้าสู่ระบบ");
                    else if (err.code === 'auth/invalid-credential' || err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password') setError("อีเมลหรือรหัสผ่านไม่ถูกต้อง");
                    else if (err.code === 'auth/weak-password') setError("รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร");
                    else setError("ข้อผิดพลาด: " + err.message);
                }
            };

            const handleGoogleLogin = async () => {
                setError(null);
                try {
                    const authInstance = getAuthInstance();
                    const { GoogleAuthProvider, signInWithPopup } = window.FirebaseSDK;
                    const provider = new GoogleAuthProvider();
                    await signInWithPopup(authInstance, provider);
                } catch (err) {
                    if (err.code === 'auth/unauthorized-domain') setError("โดเมนยังไม่ได้รับอนุญาตใน Firebase Console");
                    else setError("เข้าสู่ระบบ Google ไม่สำเร็จ: " + err.message);
                }
            };

            const handleGuestLogin = async () => {
                setError(null);
                try {
                    const authInstance = getAuthInstance();
                    const { signInAnonymously } = window.FirebaseSDK;
                    await signInAnonymously(authInstance);
                } catch (err) {
                    if (err.code === 'auth/unauthorized-domain') setError("โดเมนยังไม่ได้รับอนุญาตใน Firebase Console");
                    else setError("เข้าใช้งานแบบผู้เยี่ยมชมไม่สำเร็จ: " + err.message);
                }
            };

            const handleLogout = async () => {
                try {
                    const authInstance = getAuthInstance();
                    const { signOut } = window.FirebaseSDK;
                    await signOut(authInstance);
                    setView('home');
                    setStep('login');
                } catch(err) { console.error(err); }
            };

            const calculateStats = (data) => {
                const { gender, age, weight, height, activity } = data;
                const w = parseFloat(weight); const h = parseFloat(height); const a = parseInt(age); const act = parseFloat(activity);
                if (isNaN(w) || isNaN(h) || isNaN(a)) return { bmr: 0, tdee: 0, bmi: 0 };
                let bmr = gender === 'male' ? (10 * w) + (6.25 * h) - (5 * a) + 5 : (10 * w) + (6.25 * h) - (5 * a) - 161;
                const tdee = Math.round(bmr * act);
                const bmi = (w / ((h / 100) ** 2)).toFixed(1);
                return { bmr: Math.round(bmr), tdee, bmi };
            };

            const getDbInstance = () => {
                const { getFirestore, initializeApp } = window.FirebaseSDK;
                let appInstance;
                try { appInstance = initializeApp(firebaseConfig); } 
                catch(e) { appInstance = initializeApp(firebaseConfig, "db-app"); }
                return getFirestore(appInstance);
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                if (!user) return;
                const { doc, setDoc } = window.FirebaseSDK;
                const stats = calculateStats(formData);
                const newProfile = { ...formData, ...stats };
                await setDoc(doc(getDbInstance(), 'artifacts', appIdStr, 'users', user.uid, 'settings', 'profile'), newProfile);
                setProfile(newProfile);
                setStep('dashboard');
            };

            const handleUpdateProfile = async (e) => {
                e.preventDefault();
                if (!user) return;
                const { doc, setDoc } = window.FirebaseSDK;
                const stats = calculateStats(formData);
                const newProfile = { ...formData, ...stats };
                await setDoc(doc(getDbInstance(), 'artifacts', appIdStr, 'users', user.uid, 'settings', 'profile'), newProfile);
                setProfile(newProfile);
                setView('home');
            };

            const handleAddWater = async (amount) => {
                if (!user) return;
                const { doc, setDoc } = window.FirebaseSDK;
                const todayStr = new Date().toLocaleDateString('en-CA');
                const newAmount = Math.max(0, waterIntake + amount);
                await setDoc(doc(getDbInstance(), 'artifacts', appIdStr, 'users', user.uid, 'water', todayStr), { amount: newAmount }, { merge: true });
            };

            const saveMeal = async () => {
                if (!user || !result) return;
                try {
                    const { collection, addDoc, serverTimestamp } = window.FirebaseSDK;
                    await addDoc(collection(getDbInstance(), 'artifacts', appIdStr, 'users', user.uid, 'meals'), {
                        ...result, mealType, timestamp: serverTimestamp()
                    });
                    setView('home'); setResult(null);
                } catch (e) { setError("บันทึกข้อมูลล้มเหลว"); }
            };

            const getDaysInMonth = (date) => new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
            const getFirstDayOfMonth = (date) => new Date(date.getFullYear(), date.getMonth(), 1).getDay();

            const generateCalendarDays = () => {
                const daysInMonth = getDaysInMonth(viewDate);
                const firstDay = getFirstDayOfMonth(viewDate);
                const days = [];
                for (let i = 0; i < firstDay; i++) days.push(null);
                for (let i = 1; i <= daysInMonth; i++) days.push(i);
                return days;
            };

            const hasMealsOnDate = (day) => {
                if (!day) return false;
                const checkDate = new Date(viewDate.getFullYear(), viewDate.getMonth(), day);
                return allMeals.some(m => {
                    if (!m.timestamp) return false;
                    const d = m.timestamp.toDate ? m.timestamp.toDate() : new Date(m.timestamp);
                    return d.toDateString() === checkDate.toDateString();
                });
            };

            const handleMonthChange = (offset) => {
                const newDate = new Date(viewDate);
                newDate.setMonth(newDate.getMonth() + offset);
                setViewDate(newDate);
            };

            const dailyLog = allMeals.filter(m => {
                if (!m.timestamp) return false;
                const d = m.timestamp.toDate ? m.timestamp.toDate() : new Date(m.timestamp);
                return d.toDateString() === viewDate.toDateString();
            }).sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));

            const goalCalories = profile?.tdee || 0;
            const consumed = dailyLog.reduce((s, m) => s + (m.calories || 0), 0);
            const consumedProtein = dailyLog.reduce((s, m) => s + (m.protein || 0), 0);
            const consumedCarbs = dailyLog.reduce((s, m) => s + (m.carbs || 0), 0);
            const consumedFat = dailyLog.reduce((s, m) => s + (m.fat || 0), 0);
            const progress = goalCalories ? Math.min((consumed / goalCalories) * 100, 100) : 0;
            const isToday = viewDate.toDateString() === new Date().toDateString();

            const goalProtein = Math.round((goalCalories * 0.25) / 4); 

            const getAssistantMessage = () => {
                if (!goalCalories) return { text: "ตั้งเป้าหมาย TDEE ในโปรไฟล์เพื่อรับคำแนะนำ", color: "text-slate-500", bg: "bg-slate-100" };
                const remain = goalCalories - consumed;
                if (remain < 0) return { text: `ทานเกินเป้าหมายไป ${Math.abs(remain)} kcal แล้ว ระวังด้วยนะครับ ⚠️`, color: "text-rose-600", bg: "bg-rose-100/50" };
                
                let advice = `วันนี้ทานได้อีก ${remain} kcal`;
                if (consumedProtein < goalProtein * 0.7) advice += ` • ยังขาดโปรตีนอีกประมาณ ${goalProtein - consumedProtein}g แนะนำเน้นเนื้อสัตว์ไขมันต่ำนะครับ 🍗`;
                else advice += ` • สมดุลสารอาหารดีมากครับ ทำต่อไป! ✨`;
                
                return { text: advice, color: "text-teal-700", bg: "bg-teal-50/80" };
            };
            const assistantMsg = getAssistantMessage();

            const GlassBackground = () => (
                <div className="fixed inset-0 z-[-1] overflow-hidden bg-slate-50">
                    <div className="absolute top-[-10%] left-[-10%] w-[60vw] h-[60vw] rounded-full bg-emerald-200/50 blur-[100px] animate-pulse"></div>
                    <div className="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-teal-200/50 blur-[100px]"></div>
                    <div className="absolute inset-0 bg-white/20 backdrop-blur-[4px]"></div>
                </div>
            );

            if (step === 'loading') return (
                <div className="h-screen flex flex-col items-center justify-center bg-[#f8fafc]">
                    <Icon name="RefreshCw" className="animate-spin text-teal-600 mb-4" size={32} />
                    <p className="text-slate-500 font-medium text-sm tracking-widest uppercase animate-pulse">กำลังโหลดระบบ...</p>
                </div>
            );

            if (step === 'login') return (
                <div className="min-h-screen relative flex flex-col items-center justify-center p-6 text-center">
                    <GlassBackground />
                    <div className="-mb-14 relative z-10 flex justify-center pointer-events-none">
                        <dotlottie-wc src="https://lottie.host/c7339853-4841-4bf7-9f07-6a5d1e7bbdb4/ySx3uIUDag.lottie" style={{ width: '300px', height: '300px' }} autoplay loop></dotlottie-wc>
                    </div>

                    <div className="bg-white/60 backdrop-blur-2xl border border-white/80 p-8 pt-14 max-w-sm w-full shadow-2xl rounded-[40px] animate-in relative z-0">
                        <h1 className="text-3xl font-extrabold text-slate-900 mb-2">NubCal</h1>
                        <p className="text-slate-500 text-sm mb-6 leading-relaxed">เข้าสู่ระบบเพื่อเก็บบันทึกข้อมูลสุขภาพของคุณไว้ใช้ในทุกอุปกรณ์</p>
                        
                        {error && (<div className="mb-4 p-3 bg-red-50 text-red-600 rounded-2xl text-xs flex items-start gap-2 text-left"><Icon name="AlertCircle" className="mt-0.5 shrink-0" size={16} /><span>{error}</span></div>)}
                        
                        <form onSubmit={handleEmailAuth} className="space-y-3 mb-4">
                            <input type="email" placeholder="อีเมล" value={email} onChange={e => setEmail(e.target.value)} className="w-full bg-white/60 border border-slate-200 p-3.5 rounded-2xl text-sm outline-none text-slate-800 shadow-sm focus:ring-2 focus:ring-teal-400 transition-all" required />
                            <input type="password" placeholder="รหัสผ่าน" value={password} onChange={e => setPassword(e.target.value)} className="w-full bg-white/60 border border-slate-200 p-3.5 rounded-2xl text-sm outline-none text-slate-800 shadow-sm focus:ring-2 focus:ring-teal-400 transition-all" required />
                            <button type="submit" className="w-full bg-teal-600 text-white py-3.5 rounded-2xl font-bold text-[15px] shadow-lg active:scale-95 transition-transform mt-2 hover:bg-teal-700">
                                {isSignUp ? 'สร้างบัญชีใหม่' : 'เข้าสู่ระบบ'}
                            </button>
                        </form>

                        <p className="text-[13px] text-slate-500 mb-6 cursor-pointer hover:text-teal-600 transition-colors font-medium" onClick={() => { setIsSignUp(!isSignUp); setError(null); }}>
                            {isSignUp ? 'มีบัญชีอยู่แล้ว? เข้าสู่ระบบที่นี่' : 'ยังไม่มีบัญชี? สมัครสมาชิกที่นี่'}
                        </p>

                        <div className="relative flex py-2 items-center mb-6">
                            <div className="flex-grow border-t border-slate-200"></div>
                            <span className="flex-shrink-0 mx-4 text-slate-400 text-xs font-semibold uppercase tracking-wider">หรือเข้าสู่ระบบด้วย</span>
                            <div className="flex-grow border-t border-slate-200"></div>
                        </div>

                        <div className="space-y-3">
                            <button onClick={handleGoogleLogin} className="w-full bg-white border border-slate-200 text-slate-700 py-3.5 rounded-2xl font-bold text-sm flex items-center justify-center gap-3 shadow-sm hover:bg-slate-50 transition-all active:scale-95">
                                <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                                Google
                            </button>
                            <button onClick={handleGuestLogin} className="w-full bg-slate-100 text-slate-600 py-3.5 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 hover:bg-slate-200 transition-all active:scale-95">
                                <span>ใช้งานแบบไม่ระบุตัวตน</span>
                            </button>
                        </div>
                    </div>
                </div>
            );

            if (step === 'onboarding') return (
                <div className="min-h-screen relative p-6 flex flex-col justify-center max-w-md mx-auto">
                    <GlassBackground />
                    <div className="bg-white/60 backdrop-blur-2xl border border-white/80 shadow-2xl p-8 rounded-[40px] text-left animate-in">
                        <div className="mb-8 text-center">
                            <div className="w-16 h-16 bg-teal-500 mx-auto rounded-3xl flex items-center justify-center text-white shadow-lg mb-4"><Icon name="Activity" size={32} /></div>
                            <h1 className="text-2xl font-bold text-slate-900">ระบุข้อมูลของคุณ</h1>
                            <p className="text-slate-500 text-sm">เพื่อคำนวณเป้าหมายแคลอรี่รายวัน</p>
                        </div>
                        <form onSubmit={handleRegister} className="space-y-4">
                            <div className="flex bg-white/40 p-1 rounded-2xl border border-white/50">
                                {['male', 'female'].map(g => (
                                    <button key={g} type="button" onClick={() => setFormData({...formData, gender: g})} className={`flex-1 py-3 rounded-xl font-bold text-sm transition-all ${formData.gender === g ? 'bg-white shadow text-teal-700' : 'text-slate-400'}`}>
                                        {g === 'male' ? 'ชาย' : 'หญิง'}
                                    </button>
                                ))}
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <GlassInput label="น้ำหนักปัจจุบัน (กก.)" value={formData.weight} onChange={v => setFormData({...formData, weight: v})} />
                                <GlassInput label="เป้าหมาย (กก.)" value={formData.targetWeight} onChange={v => setFormData({...formData, targetWeight: v})} />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <GlassInput label="ส่วนสูง (ซม.)" value={formData.height} onChange={v => setFormData({...formData, height: v})} />
                                <GlassInput label="อายุ (ปี)" value={formData.age} onChange={v => setFormData({...formData, age: v})} />
                            </div>
                            <div className="space-y-1">
                                <label className="text-[11px] font-bold text-slate-500 uppercase tracking-widest ml-2">ระดับกิจกรรม</label>
                                <select value={formData.activity} onChange={e => setFormData({...formData, activity: e.target.value})} className="w-full bg-white/60 border border-white p-4 rounded-[20px] text-sm outline-none text-slate-800 appearance-none shadow-sm focus:ring-2 focus:ring-teal-400">
                                    <option value="1.2">นั่งทำงานเป็นส่วนใหญ่</option>
                                    <option value="1.375">ออกกำลังกายเบา (1-3 วัน/สัปดาห์)</option>
                                    <option value="1.55">ออกกำลังกายปานกลาง (3-5 วัน/สัปดาห์)</option>
                                    <option value="1.725">ออกกำลังกายหนัก (6-7 วัน/สัปดาห์)</option>
                                    <option value="1.9">ออกกำลังกายหนักมาก</option>
                                </select>
                            </div>
                            <button className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-lg shadow-xl mt-4 active:scale-95 transition-transform">บันทึกและเริ่มใช้งาน</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen relative pb-32 max-w-md mx-auto">
                    <GlassBackground />
                    <header className="bg-white/40 backdrop-blur-xl px-8 pt-12 pb-8 rounded-b-[48px] border-b border-white/60 shadow-sm relative z-20">
                        <div className="flex justify-between items-center mb-8 text-left">
                            <div className="flex items-center space-x-3 cursor-pointer" onClick={() => setView('profile')}>
                                <div className="w-11 h-11 bg-white border border-white/80 rounded-2xl flex items-center justify-center text-teal-600 shadow-sm"><Icon name="User" size={20}/></div>
                                <div>
                                    <p className="text-[10px] font-bold text-teal-700 uppercase tracking-wider flex items-center">แก้ไขข้อมูล <Icon name="Edit3" size={10} className="ml-1 opacity-50"/></p>
                                    <p className="text-sm font-bold text-slate-800 flex items-center gap-2">
                                        BMI: {profile?.bmi || '-'}
                                        {!isToday && <span className="bg-amber-100 text-amber-700 text-[10px] font-bold px-2 py-0.5 rounded-full">{viewDate.toLocaleDateString('th-TH', { day:'numeric', month:'short' })}</span>}
                                    </p>
                                </div>
                            </div>
                            <div className="text-right">
                                <p className="text-[10px] font-bold text-teal-700 uppercase tracking-wider">เป้าหมาย TDEE</p>
                                <p className="text-sm font-bold text-slate-800">{profile?.tdee || 0} kcal</p>
                            </div>
                        </div>

                        <div className="flex flex-col items-center">
                            <div className="relative w-56 h-56 flex items-center justify-center">
                                <svg className="w-full h-full -rotate-90">
                                    <circle cx="112" cy="112" r="100" fill="transparent" stroke="rgba(255,255,255,0.4)" strokeWidth="16" />
                                    <circle cx="112" cy="112" r="100" fill="transparent" stroke="#10b981" strokeWidth="16" strokeDasharray={628} strokeDashoffset={628 - (628 * progress) / 100} strokeLinecap="round" className="transition-all duration-1000 ease-out" />
                                </svg>
                                <div className="absolute text-center bg-white/40 backdrop-blur-md rounded-full w-36 h-36 flex flex-col items-center justify-center border border-white/50 shadow-inner">
                                    <p className="text-5xl font-black text-slate-800">{consumed}</p>
                                    <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Kcal Eaten</p>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="px-6 mt-6 relative z-10">
                        {error && <div className="mb-4 p-4 bg-red-50 text-red-600 rounded-2xl text-sm text-left border border-red-100">{error}</div>}

                        {view === 'home' && (
                            <div className="space-y-6 animate-in">
                                {isToday && (
                                    <div className={`backdrop-blur-xl rounded-3xl border border-white/80 p-4 shadow-sm flex items-start space-x-3 text-left ${assistantMsg.bg}`}>
                                        <div className="bg-white p-2 rounded-full shadow-sm shrink-0"><Icon name="MessageCircle" size={20} className={assistantMsg.color}/></div>
                                        <p className={`text-sm font-medium leading-relaxed ${assistantMsg.color}`}>{assistantMsg.text}</p>
                                    </div>
                                )}

                                <div onClick={() => { setSearchTerm(''); setView('search'); setError(null); }} className="bg-white/60 backdrop-blur-lg p-6 rounded-[32px] border border-white/80 shadow flex items-center justify-between cursor-pointer active:scale-95 transition-all text-left">
                                    <div className="flex items-center space-x-4">
                                        <div className="w-14 h-14 bg-teal-500 rounded-2xl flex items-center justify-center text-white shadow-lg"><Icon name="Search" size={26} /></div>
                                        <div><h3 className="font-bold text-lg text-slate-800">ค้นหาเมนูอาหาร</h3><p className="text-xs text-slate-500">เลือกจากฐานข้อมูลที่มีอยู่</p></div>
                                    </div>
                                    <Icon name="Plus" size={24} className="text-teal-600"/>
                                </div>

                                {profile?.targetWeight && (
                                    <div className="bg-rose-50/60 backdrop-blur-xl rounded-[32px] border border-rose-100/50 p-6 flex items-center justify-between shadow-sm text-left">
                                        <div className="flex items-center space-x-4">
                                            <div className="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-rose-500 shadow-sm"><Icon name="Target" size={24} /></div>
                                            <div><h3 className="font-bold text-sm text-slate-800">เป้าหมายน้ำหนัก</h3><p className="text-xs text-slate-500">ปัจจุบัน {profile.weight} กก. → เป้าหมาย {profile.targetWeight} กก.</p></div>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-lg font-black text-rose-500">{Math.abs(profile.weight - profile.targetWeight).toFixed(1)}</p>
                                            <p className="text-[9px] text-slate-500 font-bold uppercase tracking-wider text-center">กก.</p>
                                        </div>
                                    </div>
                                )}

                                <div className="bg-blue-50/60 backdrop-blur-xl rounded-[32px] border border-blue-100/50 p-6 flex items-center justify-between shadow-sm text-left">
                                    <div className="flex items-center space-x-4">
                                        <div className="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-blue-500 shadow-sm"><Icon name="Droplets" size={24} /></div>
                                        <div><h3 className="font-bold text-sm text-slate-800">ดื่มน้ำวันนี้</h3><p className="text-xs text-slate-500">{waterIntake} / 8 แก้ว</p></div>
                                    </div>
                                    <div className="flex space-x-2">
                                        <button onClick={() => handleAddWater(-1)} className="w-8 h-8 rounded-full bg-white text-blue-500 font-bold border border-blue-100 shadow-sm">-</button>
                                        <button onClick={() => handleAddWater(1)} className="w-10 h-10 rounded-full bg-blue-500 text-white font-bold shadow-md">+</button>
                                    </div>
                                </div>

                                <div className="bg-white/40 backdrop-blur-xl rounded-[36px] border border-white/60 p-6 text-left">
                                    <h3 className="text-base font-bold flex items-center space-x-2 mb-4 text-slate-800"><Icon name="History" size={18} className="text-teal-600"/><span>รายการวันนี้</span></h3>
                                    <div className="space-y-3">
                                        {dailyLog.length === 0 ? <p className="text-center text-slate-400 py-4 text-xs tracking-widest uppercase font-medium">ยังไม่มีข้อมูล</p> :
                                            dailyLog.map(m => (
                                                <div key={m.id} className="bg-white/60 p-4 rounded-2xl border border-white/80 flex items-center justify-between shadow-sm">
                                                    <div className="flex items-center space-x-3">
                                                        <div className="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-teal-600 font-black text-xs shadow-sm border border-slate-50">{m.mealType?.[0] || 'M'}</div>
                                                        <div><p className="font-bold text-sm text-slate-800">{m.food_name}</p><p className="text-[10px] text-slate-500 font-bold">{m.mealType} • {m.calories} kcal</p></div>
                                                    </div>
                                                </div>
                                            ))
                                        }
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'search' && (
                            <div className="space-y-4 animate-in text-left">
                                <div className="flex items-center space-x-3 mb-6">
                                    <button onClick={() => setView('home')} className="p-3 bg-white/60 backdrop-blur rounded-2xl border border-white/80 shadow-sm"><Icon name="ChevronLeft" size={20}/></button>
                                    <h2 className="text-xl font-bold text-slate-800">ค้นหาเมนู</h2>
                                </div>
                                <div className="relative">
                                    <Icon name="Search" className="absolute left-4 top-4 text-slate-400" size={20} />
                                    <input type="text" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} placeholder="พิมพ์ชื่ออาหารที่นี่..." className="w-full bg-white/80 border border-white p-4 pl-12 rounded-[24px] text-sm outline-none text-slate-800 shadow-sm focus:ring-2 focus:ring-teal-400 transition-all" autoFocus />
                                </div>
                                <div className="bg-white/40 backdrop-blur-xl rounded-[32px] border border-white/60 p-4 mt-4 space-y-2 max-h-[50vh] overflow-y-auto">
                                    {foodDatabase.filter(f => f.food_name.includes(searchTerm)).map(food => (
                                        <div key={food.id} onClick={() => { setResult({...food}); setView('result'); }} className="bg-white/60 p-4 rounded-2xl border border-white/80 flex items-center justify-between shadow-sm cursor-pointer hover:bg-white active:scale-95 transition-all">
                                            <div>
                                                <p className="font-bold text-sm text-slate-800">{food.food_name}</p>
                                                <p className="text-[10px] text-slate-500 font-bold">{food.summary}</p>
                                            </div>
                                            <div className="text-right">
                                                <p className="font-black text-teal-600">{food.calories} <span className="text-[10px] font-bold opacity-70">kcal</span></p>
                                            </div>
                                        </div>
                                    ))}
                                    {foodDatabase.filter(f => f.food_name.includes(searchTerm)).length === 0 && (
                                        <p className="text-center text-slate-400 py-6 text-sm">ไม่พบเมนูนี้ในระบบ</p>
                                    )}
                                </div>
                                <button onClick={() => { setView('manual'); setError(null); }} className="w-full bg-slate-800 text-white py-4 rounded-[24px] font-bold text-sm shadow-xl mt-4 active:scale-95 transition-all flex items-center justify-center space-x-2">
                                    <Icon name="Edit3" size={18}/><span>เพิ่มข้อมูลอาหารเอง</span>
                                </button>
                            </div>
                        )}

                        {view === 'manual' && (
                            <div className="space-y-4 animate-in text-left">
                                <div className="flex items-center space-x-3 mb-6">
                                    <button onClick={() => { setView('search'); setError(null); }} className="p-3 bg-white/60 backdrop-blur rounded-2xl border border-white/80 shadow-sm"><Icon name="ChevronLeft" size={20}/></button>
                                    <h2 className="text-xl font-bold text-slate-800">เพิ่มข้อมูลเอง</h2>
                                </div>
                                <div className="bg-white/60 backdrop-blur-xl rounded-[36px] border border-white/80 p-6 shadow-sm space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-[11px] font-bold text-slate-500 uppercase tracking-widest ml-2">ชื่ออาหาร</label>
                                        <input type="text" placeholder="เช่น สลัดผัก" value={manualEntry.food_name} onChange={e => setManualEntry({...manualEntry, food_name: e.target.value})} className="w-full bg-white border border-white p-4 rounded-[20px] text-sm outline-none text-slate-800 shadow-sm focus:ring-2 focus:ring-teal-400" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[11px] font-bold text-slate-500 uppercase tracking-widest ml-2">แคลอรี่ (kcal)</label>
                                        <input type="number" placeholder="0" value={manualEntry.calories} onChange={e => setManualEntry({...manualEntry, calories: e.target.value})} className="w-full bg-white border border-white p-4 rounded-[20px] text-sm outline-none text-slate-800 shadow-sm focus:ring-2 focus:ring-teal-400" />
                                    </div>
                                    <div className="grid grid-cols-3 gap-3">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-sky-600 uppercase tracking-widest ml-2">โปรตีน (g)</label>
                                            <input type="number" placeholder="0" value={manualEntry.protein} onChange={e => setManualEntry({...manualEntry, protein: e.target.value})} className="w-full bg-white border border-white p-3 rounded-[16px] text-sm outline-none text-slate-800 shadow-sm focus:ring-2 focus:ring-sky-400" />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-fuchsia-600 uppercase tracking-widest ml-2">คาร์บ (g)</label>
                                            <input type="number" placeholder="0" value={manualEntry.carbs} onChange={e => setManualEntry({...manualEntry, carbs: e.target.value})} className="w-full bg-white border border-white p-3 rounded-[16px] text-sm outline-none text-slate-800 shadow-sm focus:ring-2 focus:ring-fuchsia-400" />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-amber-600 uppercase tracking-widest ml-2">ไขมัน (g)</label>
                                            <input type="number" placeholder="0" value={manualEntry.fat} onChange={e => setManualEntry({...manualEntry, fat: e.target.value})} className="w-full bg-white border border-white p-3 rounded-[16px] text-sm outline-none text-slate-800 shadow-sm focus:ring-2 focus:ring-amber-400" />
                                        </div>
                                    </div>
                                    <button onClick={() => {
                                        if(!manualEntry.food_name || !manualEntry.calories) return setError('กรุณากรอกชื่อและแคลอรี่ให้ครบถ้วน');
                                        setError(null);
                                        setResult({
                                            food_name: manualEntry.food_name,
                                            calories: parseInt(manualEntry.calories) || 0,
                                            protein: parseInt(manualEntry.protein) || 0,
                                            carbs: parseInt(manualEntry.carbs) || 0,
                                            fat: parseInt(manualEntry.fat) || 0,
                                            summary: 'เพิ่มข้อมูลโดยผู้ใช้'
                                        });
                                        setManualEntry({ food_name: '', calories: '', protein: '', carbs: '', fat: '' });
                                        setView('result');
                                    }} className="w-full bg-teal-600 text-white py-4 rounded-[24px] font-bold text-sm shadow-lg mt-4 active:scale-95 transition-all">บันทึกข้อมูลอาหาร</button>
                                </div>
                            </div>
                        )}

                        {view === 'calendar' && (
                            <div className="space-y-6 animate-in text-center">
                                <div className="bg-white/60 backdrop-blur-xl rounded-[36px] border border-white/80 p-6 shadow-sm">
                                    <div className="flex justify-between items-center mb-6">
                                        <button onClick={() => handleMonthChange(-1)} className="p-2 bg-white rounded-xl shadow-sm"><Icon name="ChevronLeft" size={20}/></button>
                                        <h2 className="font-bold text-lg text-slate-800">{viewDate.toLocaleDateString('th-TH', { month: 'long', year: 'numeric' })}</h2>
                                        <button onClick={() => handleMonthChange(1)} className="p-2 bg-white rounded-xl shadow-sm text-slate-800"><Icon name="ChevronRight" size={20}/></button>
                                    </div>
                                    
                                    <div className="grid grid-cols-7 gap-2 mb-2">
                                        {['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'].map(d => <div key={d} className="text-[10px] font-bold text-slate-400">{d}</div>)}
                                    </div>
                                    <div className="grid grid-cols-7 gap-2">
                                        {generateCalendarDays().map((day, idx) => {
                                            const thisDate = day ? new Date(viewDate.getFullYear(), viewDate.getMonth(), day) : null;
                                            const isSelectedDay = thisDate && thisDate.toDateString() === viewDate.toDateString();
                                            const isCurrentToday = thisDate && thisDate.toDateString() === new Date().toDateString();
                                            const hasData = hasMealsOnDate(day);

                                            return (
                                                <div key={idx} 
                                                    onClick={() => { if(day) { const newD = new Date(viewDate.getFullYear(), viewDate.getMonth(), day); setViewDate(newD); setView('home'); } }}
                                                    className={`aspect-square rounded-2xl flex flex-col items-center justify-center relative cursor-pointer transition-all
                                                    ${!day ? 'invisible' : ''}
                                                    ${isSelectedDay ? 'bg-teal-500 text-white shadow-md' : 'bg-white/50 text-slate-700 hover:bg-white'}
                                                    ${isCurrentToday && !isSelectedDay ? 'border-2 border-teal-500' : ''}
                                                `}>
                                                    <span className={`text-sm font-bold ${isSelectedDay ? 'text-white' : ''}`}>{day}</span>
                                                    {hasData && <span className={`absolute bottom-1.5 w-1.5 h-1.5 rounded-full ${isSelectedDay ? 'bg-white' : 'bg-teal-400'}`}></span>}
                                                </div>
                                            )
                                        })}
                                    </div>
                                    {!isToday && (
                                        <div className="mt-6">
                                            <button onClick={() => { setViewDate(new Date()); setView('home'); }} className="text-xs font-bold text-teal-600 bg-teal-50 px-4 py-2 rounded-xl">กลับไปวันนี้</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {view === 'result' && result && (
                            <div className="animate-in text-left">
                                <div className="bg-white/60 backdrop-blur-2xl p-8 rounded-[40px] border border-white/80 text-center shadow-xl">
                                    <h2 className="text-2xl font-black mb-1 text-slate-800">{result.food_name}</h2>
                                    <p className="text-slate-500 text-xs mb-8">{result.summary}</p>
                                    <div className="inline-flex flex-col bg-emerald-500 text-white px-8 py-5 rounded-[32px] shadow-lg mb-8 border-4 border-emerald-400/30">
                                        <span className="text-5xl font-black">{result.calories}</span>
                                        <span className="text-[10px] uppercase font-bold mt-1">kcal</span>
                                    </div>
                                    <div className="grid grid-cols-3 gap-3 mb-8 text-center">
                                        <GlassMacroCard label="Protein" value={result.protein} color="text-sky-600" />
                                        <GlassMacroCard label="Carbs" value={result.carbs} color="text-fuchsia-600" />
                                        <GlassMacroCard label="Fat" value={result.fat} color="text-amber-600" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-2 mb-8">
                                        {['Breakfast', 'Lunch', 'Dinner', 'Snack'].map(type => (
                                            <button key={type} onClick={() => setMealType(type)} className={`py-3 rounded-xl font-bold text-xs border ${mealType === type ? 'bg-teal-500 text-white border-teal-400 shadow-sm' : 'bg-white/50 text-slate-400 border-white/80'}`}>{type}</button>
                                        ))}
                                    </div>
                                    <button onClick={saveMeal} className="w-full bg-slate-800 text-white py-5 rounded-[24px] font-bold text-lg shadow-xl active:scale-95 transition-all flex items-center justify-center space-x-2"><Icon name="CheckCircle2" size={24}/><span>บันทึกมื้อนี้</span></button>
                                </div>
                            </div>
                        )}

                        {view === 'profile' && (
                            <div className="space-y-6 text-left animate-in">
                                <div className="bg-white/60 backdrop-blur-xl rounded-[36px] border border-white/80 p-8 shadow-sm">
                                    <h3 className="font-bold text-slate-800 flex items-center space-x-2 mb-6"><Icon name="User" className="text-teal-600" size={20}/><span>แก้ไขโปรไฟล์</span></h3>
                                    <form onSubmit={handleUpdateProfile} className="space-y-5">
                                        <div className="flex bg-white/40 p-1 rounded-2xl border border-white/50 shadow-inner">
                                            {['male', 'female'].map(g => (
                                                <button key={g} type="button" onClick={() => setFormData({...formData, gender: g})} className={`flex-1 py-3 rounded-xl font-bold text-sm transition-all ${formData.gender === g ? 'bg-white shadow text-teal-700' : 'text-slate-400'}`}>
                                                    {g === 'male' ? 'ชาย' : 'หญิง'}
                                                </button>
                                            ))}
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <GlassInput label="น้ำหนักปัจจุบัน (กก.)" value={formData.weight} onChange={v => setFormData({...formData, weight: v})} />
                                            <GlassInput label="เป้าหมาย (กก.)" value={formData.targetWeight} onChange={v => setFormData({...formData, targetWeight: v})} />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <GlassInput label="ส่วนสูง (ซม.)" value={formData.height} onChange={v => setFormData({...formData, height: v})} />
                                            <GlassInput label="อายุ (ปี)" value={formData.age} onChange={v => setFormData({...formData, age: v})} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[11px] font-bold text-slate-500 uppercase tracking-widest ml-2">ระดับกิจกรรม</label>
                                            <select value={formData.activity} onChange={e => setFormData({...formData, activity: e.target.value})} className="w-full bg-white/60 border border-white p-4 rounded-[20px] text-sm focus:ring-2 focus:ring-teal-400 outline-none text-slate-800 appearance-none shadow-sm">
                                                <option value="1.2">นั่งทำงานเป็นส่วนใหญ่</option>
                                                <option value="1.375">ออกกำลังกายเบา (1-3 วัน/สัปดาห์)</option>
                                                <option value="1.55">ออกกำลังกายปานกลาง (3-5 วัน/สัปดาห์)</option>
                                                <option value="1.725">ออกกำลังกายหนัก (6-7 วัน/สัปดาห์)</option>
                                                <option value="1.9">ออกกำลังกายหนักมาก</option>
                                            </select>
                                        </div>
                                        <div className="flex space-x-3 mt-6">
                                            <button type="button" onClick={() => setView('home')} className="flex-1 bg-white/50 py-4 rounded-2xl font-bold text-sm text-slate-500 border border-white/80 active:scale-95 transition-transform">ยกเลิก</button>
                                            <button type="submit" className="flex-[2] bg-teal-600 text-white py-4 rounded-2xl font-bold text-sm shadow-lg active:scale-95 transition-all">บันทึกข้อมูล</button>
                                        </div>
                                    </form>

                                    <div className="mt-8 pt-8 border-t border-white/50">
                                        <button onClick={handleLogout} type="button" className="w-full bg-red-50/80 text-red-600 py-4 rounded-[20px] font-semibold text-[15px] flex items-center justify-center gap-2 transition-all hover:bg-red-100">
                                            <Icon name="LogOut" size={18}/><span>ออกจากระบบ</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Bottom Navigation */}
                    <nav className="fixed bottom-6 left-6 right-6 bg-white/60 backdrop-blur-2xl border border-white/80 shadow-xl h-20 rounded-[36px] flex items-center justify-around px-2 z-50">
                        <NavButton active={view === 'home'} onClick={() => setView('home')} icon={<Icon name="Utensils" size={24}/>} />
                        <NavButton active={view === 'calendar'} onClick={() => setView('calendar')} icon={<Icon name="CalendarDays" size={24}/>} />
                        <button onClick={() => { setSearchTerm(''); setView('search'); setError(null); }} className="w-16 h-16 bg-gradient-to-br from-teal-500 to-emerald-500 text-white rounded-[24px] flex items-center justify-center shadow-lg active:scale-90 transition-transform -mt-12 border-4 border-white">
                           <Icon name="Plus" size={32}/>
                        </button>
                        <NavButton active={view === 'profile'} onClick={() => setView('profile')} icon={<Icon name="User" size={24}/>} />
                    </nav>
                </div>
            );
        }

        // --- Sub-components ---
        function GlassInput({ label, placeholder, value, onChange }) {
            return (
                <div className="space-y-1 text-left">
                    <label className="text-[11px] font-bold text-slate-500 uppercase tracking-widest ml-2">{label}</label>
                    <input required type="number" placeholder={placeholder} value={value} onChange={e => onChange(e.target.value)}
                        className="w-full bg-white/60 border border-white p-4 rounded-[20px] text-sm outline-none text-slate-800 shadow-sm focus:ring-2 focus:ring-teal-400" />
                </div>
            );
        }

        function GlassMacroCard({ label, value, color }) {
            return (
                <div className="bg-white/60 p-4 rounded-[24px] border border-white shadow-sm flex flex-col items-center flex-1">
                    <p className={`text-[9px] font-black uppercase tracking-wider mb-1 ${color}`}>{label}</p>
                    <p className="text-xl font-black text-slate-800 tracking-tighter">{value}<span className="text-[10px] ml-0.5 opacity-50 font-bold">g</span></p>
                </div>
            );
        }

        function NavButton({ active, onClick, icon }) {
            return (
                <button onClick={onClick} className={`p-4 rounded-2xl transition-all ${active ? 'text-teal-600 bg-white shadow-sm border border-white' : 'text-slate-400 hover:text-slate-500'}`}>
                    {icon}
                </button>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
