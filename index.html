<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NubCal AI - สมุดจดแคลอรีอัจฉริยะ</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.3/dist/dotlottie-wc.js" type="module"></script>
    
    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: #fafaf9; 
            margin: 0; 
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden; 
            color: #1c1917; 
        }
        
        .minimal-card {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.02);
        }
        
        .glass-panel { background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(255, 255, 255, 0.6); }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.8); }
        .minimal-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid rgba(0,0,0,0.03); }

        .btn-primary {
            background-color: #1c1917; 
            color: white;
            border-radius: 9999px;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }
        .btn-primary:active { transform: scale(0.96); }

        .chip-scroll::-webkit-scrollbar { display: none; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        window.FirebaseSDK = { initializeApp, getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, serverTimestamp, getAuth, signInAnonymously, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                Activity: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>,
                RefreshCw: <><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></>,
                AlertCircle: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>,
                Home: <><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
                User: <><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
                Plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
                History: <><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><polyline points="12 7 12 12 15 15"/></>,
                PieChart: <><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></>,
                Droplets: <><path d="M7 16.3c2.2 0 4-1.8 4-4 0-3.3-4-6.3-4-6.3s-4 3-4 6.3c0 2.2 1.8 4 4 4Z"/><path d="M17 18.5c1.1 0 2-1.1 2-2.5 0-2.4-2-4-2-4s-2 1.6-2 4c0 1.4.9 2.5 2 2.5Z"/></>,
                MessageCircle: <path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/>,
                Send: <><line x1="22" y1="2" x2="11" y2="13"/><polyline points="22 2 15 22 11 13 2 9 22 2"/></>,
                Sparkles: <><path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"/></>,
                X: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
                ChevronLeft: <polyline points="15 18 9 12 15 6"/>,
                CheckCircle2: <><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></>,
                ArrowRight: <><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>,
                Settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
                Search: <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
                Target: <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const firebaseConfig = {
            apiKey: "AIzaSyCKSPlMznK713bLuSyR3b7Kj1BJcCuQeJI",
            authDomain: "nubcal-cbd69.firebaseapp.com",
            projectId: "nubcal-cbd69",
            storageBucket: "nubcal-cbd69.firebasestorage.app",
            messagingSenderId: "44640039163",
            appId: "1:44640039163:web:6ae6d2573f26e08ee4805e",
            measurementId: "G-4EHW3MLZ4G"
        };

        const QUICK_TAGS = [
            "☕ กาแฟดำ", "🥚 ไข่ต้ม", "🥗 สลัดผัก", 
            "🍌 กล้วยหอม", "🍗 อกไก่ย่าง", "🥛 นมโปรตีน",
            "🥪 แซนด์วิชทูน่า", "🍎 แอปเปิ้ล"
        ];

        function App() {
            const [splashStep, setSplashStep] = useState('animating');
            const [isSDKReady, setIsSDKReady] = useState(false);
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [step, setStep] = useState('loading');
            const [view, setView] = useState('home'); 
            
            // เพิ่ม goal เข้าไปใน State
            const [formData, setFormData] = useState({ 
                gender: 'male', age: '', weight: '', height: '', activity: '1.2', goal: 'maintain' 
            });
            
            const [foodInput, setFoodInput] = useState("");
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);
            const [mealType, setMealType] = useState('Lunch');
            const [dailyLog, setDailyLog] = useState([]);
            const [waterIntake, setWaterIntake] = useState(0);
            
            const [insights, setInsights] = useState(null);
            const [loadingInsights, setLoadingInsights] = useState(false);
            
            const [isChatOpen, setIsChatOpen] = useState(false);
            const [chatInput, setChatInput] = useState("");
            const [chatMessages, setChatMessages] = useState([{ role: 'model', content: 'สวัสดีครับ! โค้ช AI ยินดีให้คำปรึกษา วันนี้มีเป้าหมายอะไรให้ผมช่วยไหมครับ? 💪' }]);
            const [isChatting, setIsChatting] = useState(false);

            const [localApiKey, setLocalApiKey] = useState(localStorage.getItem('qwenApiKey') || "sk-f7ca662bbab4484b9fcac11fff166ae3");
            const [showSettings, setShowSettings] = useState(false);

            const getGreeting = () => {
                const hour = new Date().getHours();
                if (hour < 12) return 'อรุณสวัสดิ์ ☀️';
                if (hour < 18) return 'สวัสดีตอนบ่าย ☕';
                return 'สวัสดีตอนเย็น 🌙';
            };

            useEffect(() => {
                const timer = setTimeout(() => {
                    setSplashStep('finished');
                    if (!localApiKey) setShowSettings(true);
                }, 2500);
                const checkSDK = setInterval(() => { if (window.FirebaseSDK) { setIsSDKReady(true); clearInterval(checkSDK); } }, 100);
                return () => { clearTimeout(timer); clearInterval(checkSDK); };
            }, []);

            useEffect(() => {
                if (!isSDKReady) return;
                const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged } = window.FirebaseSDK;
                const appInstance = initializeApp(firebaseConfig);
                const authInstance = getAuth(appInstance);
                signInAnonymously(authInstance).catch((err) => setError(`Auth Error: ${err.message}`));
                const unsubscribe = onAuthStateChanged(authInstance, setUser);
                return () => unsubscribe();
            }, [isSDKReady]);

            useEffect(() => {
                if (!user || !isSDKReady) return;
                const { getFirestore, doc, getDoc, collection, onSnapshot } = window.FirebaseSDK;
                const db = getFirestore();
                const appIdStr = "calorie-ai-pro-glass";

                getDoc(doc(db, 'artifacts', appIdStr, 'users', user.uid, 'settings', 'profile')).then(snap => {
                    if (snap.exists()) {
                        setProfile(snap.data());
                        setFormData({ 
                            gender: snap.data().gender || 'male', 
                            age: snap.data().age || '', 
                            weight: snap.data().weight || '', 
                            height: snap.data().height || '', 
                            activity: snap.data().activity || '1.2',
                            goal: snap.data().goal || 'maintain'
                        });
                        setStep('dashboard');
                    } else setStep('onboarding');
                });

                const unsubscribeMeals = onSnapshot(collection(db, 'artifacts', appIdStr, 'users', user.uid, 'meals'), (snapshot) => {
                    const todayStr = new Date().toDateString();
                    const filtered = snapshot.docs.map(d => ({ id: d.id, ...d.data() }))
                        .filter(m => m.timestamp && m.timestamp.toDate().toDateString() === todayStr);
                    setDailyLog(filtered.sort((a,b) => b.timestamp - a.timestamp));
                });

                const unsubscribeWater = onSnapshot(doc(db, 'artifacts', appIdStr, 'users', user.uid, 'water', new Date().toLocaleDateString('en-CA')), (docSnap) => {
                    setWaterIntake(docSnap.exists() ? docSnap.data().amount : 0);
                });

                return () => { unsubscribeMeals(); unsubscribeWater(); };
            }, [user, isSDKReady]);

            // อัปเกรดระบบคำนวณเป้าหมาย (Goal Setting System)
            const calculateStats = (data) => {
                const { gender, age, weight, height, activity, goal } = data;
                const w = parseFloat(weight); const h = parseFloat(height); const a = parseInt(age); const act = parseFloat(activity);
                if (isNaN(w) || isNaN(h) || isNaN(a)) return { bmr: 0, tdee: 0, bmi: 0 };
                
                let bmr = gender === 'male' ? (10 * w) + (6.25 * h) - (5 * a) + 5 : (10 * w) + (6.25 * h) - (5 * a) - 161;
                const baseTdee = Math.round(bmr * act);
                const bmi = (w / ((h / 100) ** 2)).toFixed(1);

                // ปรับแคลอรีตามเป้าหมาย
                let targetCalories = baseTdee;
                if (goal === 'lose') targetCalories -= 400; // ลดไขมัน
                else if (goal === 'gain') targetCalories += 300; // สร้างกล้ามเนื้อ

                // แบ่งสัดส่วน Macro ตามเป้าหมาย
                let proPct = 0.3, carbPct = 0.4, fatPct = 0.3;
                if (goal === 'lose') { proPct = 0.4; carbPct = 0.3; fatPct = 0.3; } // High Pro, Low Carb
                else if (goal === 'gain') { proPct = 0.35; carbPct = 0.45; fatPct = 0.2; } // High Carb, Low Fat

                const targetPro = Math.round((targetCalories * proPct) / 4);
                const targetCarb = Math.round((targetCalories * carbPct) / 4);
                const targetFat = Math.round((targetCalories * fatPct) / 9);

                return { 
                    bmr: Math.round(bmr), 
                    tdee: baseTdee, 
                    targetCalories, 
                    targetPro, 
                    targetCarb, 
                    targetFat, 
                    bmi, 
                    goal 
                };
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                if (!user || !isSDKReady) return;
                const { getFirestore, doc, setDoc } = window.FirebaseSDK;
                const stats = calculateStats(formData);
                const newProfile = { ...formData, ...stats };
                await setDoc(doc(getFirestore(), 'artifacts', 'calorie-ai-pro-glass', 'users', user.uid, 'settings', 'profile'), newProfile);
                setProfile(newProfile); setStep('dashboard');
            };

            const handleUpdateProfile = async (e) => {
                e.preventDefault();
                if (!user || !isSDKReady) return;
                const { getFirestore, doc, setDoc } = window.FirebaseSDK;
                const stats = calculateStats(formData);
                const newProfile = { ...formData, ...stats };
                await setDoc(doc(getFirestore(), 'artifacts', 'calorie-ai-pro-glass', 'users', user.uid, 'settings', 'profile'), newProfile);
                setProfile(newProfile); setView('home');
            };

            const saveApiKey = () => {
                localStorage.setItem('qwenApiKey', localApiKey);
                setShowSettings(false);
            };

            const callAIText = async (prompt) => {
                if (!localApiKey) { setShowSettings(true); throw new Error("กรุณาตั้งค่า API Key ก่อนใช้งาน"); }
                const res = await fetch("https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${localApiKey}` },
                    body: JSON.stringify({ model: "qwen-plus", messages: [{ role: "user", content: prompt }], temperature: 0.1 })
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error.message || "การเชื่อมต่อขัดข้อง");
                return JSON.parse(data.choices[0].message.content.replace(/```json|```/g, '').trim());
            };

            const handleAnalyzeFood = async (foodName) => {
                const targetFood = foodName || foodInput;
                if (!targetFood.trim()) return;
                
                setLoading(true); setError(null);
                try {
                    const prompt = `ประเมินโภชนาการอาหาร: "${targetFood}". ตอบเป็น JSON เท่านั้น: { "food_name": "ชื่อเมนูไทย", "calories": จำนวนเต็มแคลอรี, "protein": จำนวนเต็ม(g), "carbs": จำนวนเต็ม(g), "fat": จำนวนเต็ม(g), "summary": "คำแนะนำสั้นๆ สไตล์โค้ช" }`;
                    const parsed = await callAIText(prompt);
                    setResult({
                        food_name: parsed.food_name || targetFood, calories: parsed.calories || 0,
                        protein: parsed.protein || 0, carbs: parsed.carbs || 0, fat: parsed.fat || 0,
                        summary: parsed.summary || "ประเมินโดย AI"
                    }); 
                    setFoodInput(""); setView('result'); 
                } catch (err) { setError(`วิเคราะห์ไม่สำเร็จ: โปรดระบุชื่ออาหารให้ชัดเจน`); } 
                finally { setLoading(false); }
            };

            const saveMeal = async () => {
                try {
                    const { getFirestore, collection, addDoc, serverTimestamp } = window.FirebaseSDK;
                    await addDoc(collection(getFirestore(), 'artifacts', 'calorie-ai-pro-glass', 'users', user.uid, 'meals'), { ...result, mealType, timestamp: serverTimestamp() });
                    setView('home'); setResult(null);
                } catch (err) { setError(`Save Error: ${err.message}`); }
            };

            const handleAddWater = async (amount) => {
                try {
                    const { getFirestore, doc, setDoc } = window.FirebaseSDK;
                    const newAmount = Math.max(0, waterIntake + amount);
                    await setDoc(doc(getFirestore(), 'artifacts', 'calorie-ai-pro-glass', 'users', user.uid, 'water', new Date().toLocaleDateString('en-CA')), { amount: newAmount }, { merge: true });
                } catch (err) { setError(`Water Error`); }
            };

            const handleSendMessage = async () => {
                if (!chatInput.trim()) return;
                const newChat = [...chatMessages, { role: 'user', content: chatInput }];
                setChatMessages(newChat); setChatInput(""); setIsChatting(true);
                try {
                    const parsed = await callAIText(`คุณคือเทรนเนอร์ส่วนตัว ข้อมูลผู้ใช้: เป้าหมาย=${profile?.goal}, แคลที่กิน=${consumedCal}/${profile?.targetCalories}. History: ${JSON.stringify(newChat)}. ตอบสั้น เป็นกันเอง Return JSON: { "reply": "..." }`);
                    setChatMessages([...newChat, { role: 'model', content: parsed.reply }]);
                } catch (err) { setChatMessages([...newChat, { role: 'model', content: `ขออภัย ระบบขัดข้องครับ` }]); } 
                finally { setIsChatting(false); }
            };

            // ประมวลผลสารอาหาร & โค้ช
            const consumedCal = dailyLog.reduce((s, m) => s + (m.calories || 0), 0);
            const consumedPro = dailyLog.reduce((s, m) => s + (m.protein || 0), 0);
            const consumedCarb = dailyLog.reduce((s, m) => s + (m.carbs || 0), 0);
            const consumedFat = dailyLog.reduce((s, m) => s + (m.fat || 0), 0);
            
            const targetCal = profile?.targetCalories || 2000;
            const targetPro = profile?.targetPro || 150;
            const targetCarb = profile?.targetCarb || 200;
            const targetFat = profile?.targetFat || 65;
            
            const progressCal = Math.min((consumedCal / targetCal) * 100, 100);

            // 💡 Smart Trainer Logic
            const getTrainerTip = () => {
                if (!profile) return "ระบุเป้าหมายในโปรไฟล์ เพื่อให้โค้ชแนะนำได้ตรงจุดครับ";
                if (consumedCal === 0) return "เริ่มต้นวันใหม่! อย่าลืมทานมื้อเช้าเพื่อเติมพลังงานนะครับ 🍳";
                
                const remCal = targetCal - consumedCal;
                const remPro = targetPro - consumedPro;

                if (remCal < 0) return "🔥 แคลอรีเกินเป้าหมายแล้ว! ไม่เป็นไรครับ พรุ่งนี้ค่อยลุยกันใหม่";
                if (remCal < 200) return `⚠️ แคลอรีใกล้เต็ม (เหลือ ${remCal} kcal) มื้อต่อไปเน้นผักและน้ำเปล่านะครับ`;
                if (remPro > (targetPro * 0.4)) return `💪 โปรตีนยังขาดอีก ${remPro}g มื้อหน้าจัดเนื้อสัตว์ อกไก่ หรือไข่เพิ่มหน่อยครับ!`;
                if (consumedCarb > targetCarb) return `🍚 กินคาร์บเยอะไปนิดนึงแล้ว มื้อต่อไปพยายามลดแป้งและน้ำตาลลงนะครับ`;
                
                return "🎯 ยอดเยี่ยม! รักษาสัดส่วนการกินแบบนี้ไว้ กำลังไปได้สวยเลยครับ";
            };

            // --- UI Rendering ---
            if (splashStep !== 'finished') return (
                <div className="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-[#fafaf9]">
                    <dotlottie-wc src="https://lottie.host/78ddc33b-4844-4fc1-873e-7b41c27384ff/iKB3yDnm5e.lottie" style={{ width: '250px', height: '250px' }} autoplay loop />
                    <p className="text-stone-500 font-medium text-sm tracking-widest uppercase mt-4 animate-pulse">Loading AI Coach...</p>
                </div>
            );

            if (step === 'loading') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center bg-[#fafaf9]">
                    <div className="minimal-card p-10 max-w-sm w-full animate-in">
                        <div className="w-16 h-16 bg-stone-100 rounded-full flex items-center justify-center text-stone-800 mx-auto mb-6"><Icon name="Activity" size={28} /></div>
                        <h1 className="text-2xl font-bold text-stone-900 mb-3">จดแคล & โค้ชส่วนตัว</h1>
                        <p className="text-stone-500 text-sm mb-10 leading-relaxed">พิมพ์ชื่ออาหาร ให้ AI คำนวณสารอาหาร พร้อมโค้ชคอยเตือนคุณทุกมื้อ</p>
                        <button onClick={() => setStep('checking')} className="w-full btn-primary py-4 font-semibold text-[15px] flex items-center justify-center space-x-2">
                            <span>เริ่มต้นใช้งาน</span><Icon name="ArrowRight" size={18} />
                        </button>
                    </div>
                </div>
            );

            if (step === 'onboarding') return (
                <div className="min-h-screen p-6 flex flex-col justify-center max-w-md mx-auto text-left bg-[#fafaf9]">
                    <div className="minimal-card p-8 animate-in">
                        <h1 className="text-2xl font-bold mb-1 text-stone-900">สร้างโปรไฟล์</h1>
                        <p className="text-stone-500 text-sm mb-6">เพื่อให้โค้ชคำนวณเป้าหมายที่เหมาะสม</p>
                        <form onSubmit={handleRegister} className="space-y-4">
                            <div className="space-y-1">
                                <label className="text-[11px] font-semibold text-stone-400 uppercase tracking-wider ml-1">เป้าหมายหลัก</label>
                                <div className="grid grid-cols-3 gap-2">
                                    <button type="button" onClick={() => setFormData({...formData, goal: 'lose'})} className={`py-3 rounded-2xl text-xs font-semibold border ${formData.goal === 'lose' ? 'bg-teal-50 border-teal-200 text-teal-700' : 'bg-white border-stone-200 text-stone-500'}`}>ลดน้ำหนัก</button>
                                    <button type="button" onClick={() => setFormData({...formData, goal: 'maintain'})} className={`py-3 rounded-2xl text-xs font-semibold border ${formData.goal === 'maintain' ? 'bg-blue-50 border-blue-200 text-blue-700' : 'bg-white border-stone-200 text-stone-500'}`}>รักษารูปร่าง</button>
                                    <button type="button" onClick={() => setFormData({...formData, goal: 'gain'})} className={`py-3 rounded-2xl text-xs font-semibold border ${formData.goal === 'gain' ? 'bg-rose-50 border-rose-200 text-rose-700' : 'bg-white border-stone-200 text-stone-500'}`}>เพิ่มกล้าม</button>
                                </div>
                            </div>
                            <div className="flex bg-stone-100 p-1 rounded-2xl">
                                {['male', 'female'].map(g => (<button key={g} type="button" onClick={() => setFormData({...formData, gender: g})} className={`flex-1 py-2.5 rounded-xl font-medium text-sm transition-all ${formData.gender === g ? 'bg-white shadow-sm text-stone-900' : 'text-stone-500'}`}>{g === 'male' ? 'ผู้ชาย' : 'ผู้หญิง'}</button>))}
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <Input label="น้ำหนัก (kg)" value={formData.weight} onChange={v => setFormData({...formData, weight: v})} />
                                <Input label="ส่วนสูง (cm)" value={formData.height} onChange={v => setFormData({...formData, height: v})} />
                            </div>
                            <Input label="อายุ (ปี)" value={formData.age} onChange={v => setFormData({...formData, age: v})} />
                            <div className="space-y-1">
                                <label className="text-[11px] font-semibold text-stone-400 uppercase tracking-wider ml-1">กิจกรรมประจำวัน</label>
                                <select value={formData.activity} onChange={e => setFormData({...formData, activity: e.target.value})} className="w-full bg-stone-50 border border-stone-200 p-4 rounded-2xl text-sm outline-none focus:border-stone-400 focus:bg-white transition-all text-stone-800">
                                    <option value="1.2">นั่งทำงานเป็นหลัก</option><option value="1.375">ออกกำลังเบา (1-3 วัน)</option><option value="1.55">ออกกำลังปานกลาง (3-5 วัน)</option><option value="1.725">ออกกำลังหนัก (6-7 วัน)</option>
                                </select>
                            </div>
                            <button type="submit" className="w-full btn-primary py-4 font-semibold text-[15px] mt-2">คำนวณแผนของฉัน</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-32 max-w-md mx-auto bg-[#fafaf9]">
                    
                    {/* Settings Modal */}
                    {showSettings && (
                        <div className="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-stone-900/20 backdrop-blur-sm p-6">
                            <div className="minimal-card p-8 w-full max-w-sm animate-in">
                                <h2 className="text-lg font-bold mb-2 text-stone-900">ตั้งค่า AI (API Key)</h2>
                                <p className="text-xs text-stone-500 mb-6">ใส่ Key ของคุณเพื่อใช้งานระบบ (บันทึกในเครื่อง)</p>
                                <input type="password" value={localApiKey} onChange={e => setLocalApiKey(e.target.value)} placeholder="sk-..." className="w-full bg-stone-50 border border-stone-200 p-4 rounded-xl text-sm outline-none focus:border-stone-400 mb-6" />
                                <div className="flex space-x-3">
                                    <button onClick={() => setShowSettings(false)} className="flex-1 bg-stone-100 py-3 rounded-xl font-semibold text-sm text-stone-600">ปิด</button>
                                    <button onClick={() => { localStorage.setItem('qwenApiKey', localApiKey); setShowSettings(false); }} className="flex-[2] btn-primary py-3 font-semibold text-sm">บันทึก</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <header className="px-6 pt-10 pb-4">
                        <div className="flex justify-between items-center mb-6">
                            <div>
                                <p className="text-xs text-stone-500 font-medium mb-1">{getGreeting()}</p>
                                <h2 className="text-xl font-bold text-stone-800 flex items-center gap-2">
                                    <span>สมุดบันทึกสุขภาพ</span>
                                </h2>
                            </div>
                            <button onClick={() => setShowSettings(true)} className="w-10 h-10 rounded-full bg-stone-100 flex items-center justify-center text-stone-600 hover:bg-stone-200 transition-colors"><Icon name="Settings" size={18}/></button>
                        </div>

                        {/* Smart Trainer Alert */}
                        <div className="bg-stone-900 text-white rounded-2xl p-4 mb-6 shadow-lg flex gap-3 items-start animate-in">
                            <div className="bg-stone-800 p-2 rounded-full shrink-0"><Icon name="Target" size={20} className="text-teal-400"/></div>
                            <div>
                                <h4 className="text-sm font-bold mb-1">โค้ชแนะนำ</h4>
                                <p className="text-xs text-stone-300 leading-relaxed">{getTrainerTip()}</p>
                            </div>
                        </div>

                        {/* Detailed Macro Ring & Bars */}
                        <div className="minimal-card p-6 flex items-center justify-between shadow-sm">
                            <div className="relative w-28 h-28 flex items-center justify-center shrink-0">
                                <svg className="w-full h-full -rotate-90">
                                    <circle cx="56" cy="56" r="48" fill="transparent" stroke="#f5f5f4" strokeWidth="10" />
                                    <circle cx="56" cy="56" r="48" fill="transparent" stroke={progressCal > 100 ? "#ef4444" : "#14b8a6"} strokeWidth="10" strokeDasharray={301.5} strokeDashoffset={301.5 - (301.5 * Math.min(progressCal, 100)) / 100} strokeLinecap="round" className="transition-all duration-1000 ease-out" />
                                </svg>
                                <div className="absolute text-center flex flex-col items-center justify-center mt-1">
                                    <p className="text-2xl font-bold text-stone-800 leading-none">{consumedCal}</p>
                                    <p className="text-[9px] font-semibold text-stone-400 uppercase tracking-widest mt-1">/ {targetCal}</p>
                                </div>
                            </div>
                            
                            <div className="flex-1 ml-5 space-y-3.5 w-full">
                                <MacroProgress label="โปรตีน" current={consumedPro} target={targetPro} color="bg-rose-400" bg="bg-rose-50" />
                                <MacroProgress label="คาร์บ" current={consumedCarb} target={targetCarb} color="bg-amber-400" bg="bg-amber-50" />
                                <MacroProgress label="ไขมัน" current={consumedFat} target={targetFat} color="bg-stone-400" bg="bg-stone-100" />
                            </div>
                        </div>
                    </header>

                    <main className="px-6 space-y-6">
                        {error && (<div className="p-4 bg-red-50 text-red-600 rounded-2xl text-xs flex items-start gap-2 animate-in"><Icon name="AlertCircle" size={16} className="mt-0.5 flex-shrink-0" /><span>{error}</span></div>)}
                        
                        {view === 'home' && (
                            <>
                                {/* Modern Search / Add Input */}
                                <div className="minimal-card p-2 flex items-center shadow-sm border border-stone-100">
                                    <div className="pl-4 pr-2 text-stone-400"><Icon name="Plus" size={20}/></div>
                                    <input type="text" value={foodInput} onChange={e => setFoodInput(e.target.value)} placeholder="พิมพ์ชื่อเมนูอาหารที่นี่..." className="flex-1 bg-transparent py-3 text-sm outline-none text-stone-800 font-medium" onKeyDown={e => e.key === 'Enter' && handleAnalyzeFood()} />
                                    <button onClick={() => handleAnalyzeFood()} disabled={loading || !foodInput.trim()} className="bg-teal-600 text-white p-3 rounded-xl disabled:opacity-50 transition-all shadow-sm">
                                        {loading ? <Icon name="RefreshCw" size={18} className="animate-spin" /> : <Icon name="Send" size={18} />}
                                    </button>
                                </div>

                                {/* Quick Emoji Tags (Scrollable) */}
                                <div>
                                    <h3 className="text-xs font-semibold text-stone-400 mb-3 px-1 uppercase tracking-wide">คีย์ลัดเมนูฮิต</h3>
                                    <div className="flex overflow-x-auto chip-scroll gap-2 pb-2">
                                        {QUICK_TAGS.map((tag) => (
                                            <button key={tag} onClick={() => { setFoodInput(tag); handleAnalyzeFood(tag); }} className="whitespace-nowrap bg-white border border-stone-200 px-4 py-2 rounded-full text-sm font-medium text-stone-600 shadow-sm active:scale-95 transition-all hover:border-stone-300">
                                                {tag}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                
                                {/* Timeline History */}
                                <div>
                                    <h3 className="text-xs font-semibold text-stone-400 mb-4 px-1 uppercase tracking-wide">ประวัติการกินวันนี้</h3>
                                    <div className="minimal-card p-5 space-y-4">
                                        {dailyLog.length === 0 ? <p className="text-center text-stone-400 py-6 text-sm">ยังไม่ได้ทานอะไรเลย 🍽️</p> : 
                                            dailyLog.map((m, i) => (
                                                <div key={m.id} className={`flex items-center justify-between ${i !== dailyLog.length - 1 ? 'border-b border-stone-100 pb-4' : ''}`}>
                                                    <div className="flex items-center gap-3">
                                                        <div className="w-10 h-10 rounded-full bg-stone-50 flex items-center justify-center text-stone-600 font-bold text-xs border border-stone-100">{m.mealType === 'Breakfast' ? 'เช้า' : m.mealType === 'Lunch' ? 'เที่ยง' : m.mealType === 'Dinner' ? 'เย็น' : 'ว่าง'}</div>
                                                        <div>
                                                            <p className="font-semibold text-stone-800 text-sm">{m.food_name}</p>
                                                            <p className="text-[11px] text-stone-400 mt-0.5">{m.protein}p • {m.carbs}c • {m.fat}f</p>
                                                        </div>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className="font-bold text-stone-800">{m.calories}</p>
                                                        <p className="text-[9px] text-stone-400 uppercase font-semibold">kcal</p>
                                                    </div>
                                                </div>
                                            ))
                                        }
                                    </div>
                                </div>
                            </>
                        )}

                        {view === 'result' && result && (
                            <div className="minimal-card p-8 text-center animate-in">
                                <div className="w-16 h-16 bg-teal-50 rounded-full flex items-center justify-center text-teal-600 mx-auto mb-4"><Icon name="Sparkles" size={24}/></div>
                                <h2 className="text-xl font-bold text-stone-900 mb-1">{result.food_name}</h2>
                                <p className="text-stone-500 text-xs mb-8">"{result.summary}"</p>
                                
                                <div className="bg-stone-900 text-white rounded-3xl py-6 mb-8 shadow-lg">
                                    <span className="text-5xl font-bold tracking-tight">{result.calories}</span>
                                    <span className="text-xs text-stone-300 ml-1 font-semibold">kcal</span>
                                </div>
                                
                                <div className="grid grid-cols-3 gap-3 mb-8">
                                    <MacroBlock label="โปรตีน" value={result.protein} color="text-rose-500" />
                                    <MacroBlock label="คาร์บ" value={result.carbs} color="text-amber-500" />
                                    <MacroBlock label="ไขมัน" value={result.fat} color="text-stone-500" />
                                </div>
                                
                                <div className="text-left mb-8">
                                    <label className="text-xs font-semibold text-stone-500 mb-3 block text-center">มื้ออาหาร</label>
                                    <div className="flex bg-stone-100 p-1 rounded-2xl">
                                        {['Breakfast', 'Lunch', 'Dinner', 'Snack'].map(type => (<button key={type} onClick={() => setMealType(type)} className={`flex-1 py-3 rounded-xl font-medium text-xs transition-all ${mealType === type ? 'bg-white shadow-sm text-stone-900' : 'text-stone-500'}`}>{type === 'Breakfast' ? 'เช้า' : type === 'Lunch' ? 'เที่ยง' : type === 'Dinner' ? 'เย็น' : 'ว่าง'}</button>))}
                                    </div>
                                </div>
                                
                                <div className="flex gap-3">
                                    <button onClick={() => setView('home')} className="flex-1 bg-stone-100 text-stone-600 py-4 rounded-2xl font-semibold text-sm transition-all active:scale-95">ยกเลิก</button>
                                    <button onClick={saveMeal} className="flex-[2] bg-teal-600 text-white py-4 rounded-2xl font-semibold text-[15px] flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-all"><Icon name="CheckCircle2" size={18}/><span>บันทึกมื้อนี้</span></button>
                                </div>
                            </div>
                        )}

                        {view === 'profile' && (
                            <div className="minimal-card p-8 text-left animate-in">
                                <h3 className="font-bold text-stone-800 flex items-center gap-2 mb-6"><Icon name="User" size={20}/><span>โปรไฟล์ & เป้าหมาย</span></h3>
                                <form onSubmit={handleUpdateProfile} className="space-y-5">
                                    <div className="space-y-1">
                                        <label className="text-[11px] font-semibold text-stone-400 uppercase tracking-wider ml-1">เป้าหมายของคุณ</label>
                                        <div className="grid grid-cols-3 gap-2">
                                            <button type="button" onClick={() => setFormData({...formData, goal: 'lose'})} className={`py-3 rounded-xl text-xs font-semibold border ${formData.goal === 'lose' ? 'bg-teal-50 border-teal-200 text-teal-700' : 'bg-white border-stone-200 text-stone-500'}`}>ลดน้ำหนัก</button>
                                            <button type="button" onClick={() => setFormData({...formData, goal: 'maintain'})} className={`py-3 rounded-xl text-xs font-semibold border ${formData.goal === 'maintain' ? 'bg-blue-50 border-blue-200 text-blue-700' : 'bg-white border-stone-200 text-stone-500'}`}>รักษารูปร่าง</button>
                                            <button type="button" onClick={() => setFormData({...formData, goal: 'gain'})} className={`py-3 rounded-xl text-xs font-semibold border ${formData.goal === 'gain' ? 'bg-rose-50 border-rose-200 text-rose-700' : 'bg-white border-stone-200 text-stone-500'}`}>เพิ่มกล้าม</button>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <Input label="น้ำหนัก (กก.)" value={formData.weight} onChange={v => setFormData({...formData, weight: v})} />
                                        <Input label="ส่วนสูง (ซม.)" value={formData.height} onChange={v => setFormData({...formData, height: v})} />
                                    </div>
                                    <Input label="อายุ (ปี)" value={formData.age} onChange={v => setFormData({...formData, age: v})} />
                                    <div className="space-y-1">
                                        <label className="text-[11px] font-semibold text-stone-400 uppercase tracking-wider ml-1">กิจกรรมประจำวัน</label>
                                        <select value={formData.activity} onChange={e => setFormData({...formData, activity: e.target.value})} className="w-full bg-stone-50 border border-stone-200 p-4 rounded-2xl text-sm outline-none focus:border-stone-400 focus:bg-white transition-all text-stone-800"><option value="1.2">นั่งทำงานเป็นหลัก</option><option value="1.375">ออกกำลังเบา (1-3 วัน)</option><option value="1.55">ออกกำลังปานกลาง (3-5 วัน)</option><option value="1.725">ออกกำลังหนัก (6-7 วัน)</option></select>
                                    </div>
                                    <button type="submit" className="w-full btn-primary py-4 font-semibold text-[15px] mt-4">อัปเดตข้อมูล</button>
                                </form>
                            </div>
                        )}
                    </main>

                    {/* Chatbot Modal */}
                    {isChatOpen && (
                        <div className="fixed inset-0 z-[60] flex flex-col justify-end">
                            <div className="absolute inset-0 bg-stone-900/20 backdrop-blur-sm" onClick={() => setIsChatOpen(false)}></div>
                            <div className="bg-white h-[75vh] rounded-t-[32px] shadow-2xl flex flex-col relative z-10 animate-in">
                                <div className="flex justify-between items-center p-6 border-b border-stone-100">
                                    <div className="flex items-center gap-3"><div className="bg-teal-50 text-teal-600 p-2.5 rounded-full"><Icon name="MessageCircle" size={20}/></div><h3 className="font-bold text-stone-800">AI เทรนเนอร์ส่วนตัว</h3></div>
                                    <button onClick={() => setIsChatOpen(false)} className="p-2 bg-stone-50 rounded-full text-stone-400 hover:bg-stone-200 transition-colors"><Icon name="X" size={20}/></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-6 space-y-4 bg-stone-50/50">
                                    {chatMessages.map((msg, i) => (<div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}><div className={`max-w-[80%] p-4 rounded-[24px] text-sm leading-relaxed ${msg.role === 'user' ? 'bg-teal-600 text-white rounded-tr-sm shadow-md' : 'bg-white border border-stone-100 text-stone-700 rounded-tl-sm shadow-sm'}`}>{msg.content}</div></div>))}
                                    {isChatting && <div className="text-teal-500 flex items-center gap-2"><Icon name="RefreshCw" size={14} className="animate-spin"/><span className="text-xs font-medium">โค้ชกำลังพิมพ์...</span></div>}
                                </div>
                                <div className="p-5 bg-white border-t border-stone-100">
                                    <div className="flex items-center bg-stone-50 p-2 rounded-2xl border border-stone-200">
                                        <input type="text" value={chatInput} onChange={e => setChatInput(e.target.value)} placeholder="พิมพ์ถามปัญหาโภชนาการ..." className="flex-1 px-3 text-sm outline-none bg-transparent text-stone-800" onKeyDown={e => e.key === 'Enter' && handleSendMessage()} />
                                        <button onClick={handleSendMessage} disabled={isChatting || !chatInput} className="bg-teal-600 text-white p-3 rounded-xl disabled:opacity-50 transition-all shadow-sm"><Icon name="Send" size={18}/></button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    <button onClick={() => setIsChatOpen(true)} className="fixed bottom-28 right-6 w-14 h-14 bg-stone-900 text-white rounded-full flex items-center justify-center shadow-xl z-40 hover:scale-105 transition-transform"><Icon name="MessageCircle" size={24}/></button>
                    
                    {/* Bottom Navigation */}
                    <nav className="fixed bottom-6 left-6 right-6 minimal-nav h-16 rounded-full flex items-center justify-around px-2 z-50 shadow-sm border border-white">
                        <button onClick={() => setView('home')} className={`p-3 rounded-full transition-all ${view === 'home' ? 'text-stone-900 bg-stone-100' : 'text-stone-400 hover:text-stone-600'}`}><Icon name="Home" size={22}/></button>
                        <button onClick={() => setView('profile')} className={`p-3 rounded-full transition-all ${view === 'profile' ? 'text-stone-900 bg-stone-100' : 'text-stone-400 hover:text-stone-600'}`}><Icon name="User" size={22}/></button>
                    </nav>
                </div>
            );
        }

        // Sub-components
        function Background() { return (<div className="fixed inset-0 z-[-1] overflow-hidden bg-[#fafaf9]"><div className="absolute top-[-10%] left-[-10%] w-[80vw] h-[80vw] rounded-full bg-teal-100/50 blur-[100px] animate-pulse"></div><div className="absolute bottom-[-10%] right-[-10%] w-[80vw] h-[80vw] rounded-full bg-rose-50/50 blur-[100px]"></div></div>); }
        
        function Input({ label, value, onChange }) { return (<div className="space-y-1 text-left"><label className="text-[11px] font-semibold text-stone-400 uppercase tracking-widest ml-1">{label}</label><input required type="number" value={value} onChange={e => onChange(e.target.value)} className="w-full bg-stone-50 border border-stone-200 p-4 rounded-2xl text-sm outline-none focus:border-stone-400 focus:bg-white transition-all text-stone-800" /></div>); }
        
        function MacroBlock({ label, value, color }) { return (<div className="bg-stone-50 p-4 rounded-2xl border border-stone-100 flex flex-col items-center"><p className={`text-[10px] font-bold uppercase tracking-wider mb-1 text-stone-400`}>{label}</p><p className={`text-lg font-bold ${color}`}>{value}<span className="text-[10px] ml-0.5 opacity-60">g</span></p></div>); }

        function MacroProgress({ label, current, target, color, bg }) { 
            const percent = Math.min((current / target) * 100, 100) || 0;
            return (
                <div className="space-y-1.5 w-full">
                    <div className="flex justify-between text-[10px] font-bold text-stone-500 uppercase tracking-wide">
                        <span>{label}</span>
                        <span>{current} / {target}g</span>
                    </div>
                    <div className={`h-2 w-full rounded-full ${bg} overflow-hidden`}>
                        <div className={`h-full rounded-full ${color} transition-all duration-500`} style={{ width: `${percent}%` }}></div>
                    </div>
                </div>
            ); 
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
